<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 ហ្គេមកាតេ Online</title>
<style>
    body { font-family: Arial, sans-serif; background: #064e3b; color: white; padding: 20px; text-align: center; }
    .box { max-width: 600px; margin: auto; background: #047857; padding: 30px; border-radius: 12px; border: 2px solid #059669; }
    button { padding: 10px 20px; background: #fef08a; color: #064e3b; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; }
</style>
</head>
<body>
<div class="box">
    <h2>🎴 ហ្គេមកាតេ (Catte) Online</h2>
    <p style="margin-top: 15px; color: #fef08a;">កូដផ្នែក UI ហ្គេមកាតេ ត្រូវបានតភ្ជាប់ទៅកាន់រចនាសម្ព័ន្ធ Logic ថ្មីរៀបចំរួចរាល់។</p>
    <p id="roomDisplay"></p>
    <button onclick="window.location.href='/'">ត្រឡប់ទៅ Lobby</button>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('roomDisplay').innerText = "លេខបន្ទប់របស់អ្នក៖ " + urlParams.get('room');
</script>
</body>
</html>
