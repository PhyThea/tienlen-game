<!-- index.html -->
<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>🃏 Tien Len Online</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:white;

    padding:15px;
}

.container{

    max-width:1200px;

    margin:auto;
}

h1{

    text-align:center;

    margin-bottom:20px;
}

.panel{

    background:#1e293b;

    padding:20px;

    border-radius:15px;

    margin-bottom:20px;
}

input{

    width:100%;

    padding:12px;

    margin-top:10px;

    border:none;

    border-radius:10px;

    font-size:16px;
}

button{

    padding:12px 20px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    margin-top:10px;

    margin-right:10px;

    font-size:16px;

    font-weight:bold;
}

.btn-green{
    background:#22c55e;
    color:white;
}

.btn-red{
    background:#ef4444;
    color:white;
}

.btn-blue{
    background:#3b82f6;
    color:white;
}

#status{

    text-align:center;

    font-size:22px;

    color:#facc15;

    margin-bottom:20px;
}

#players{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin-bottom:20px;
}

.player{

    background:#334155;

    padding:12px;

    border-radius:10px;

    min-width:160px;
}

.turn{

    border:3px solid #22c55e;
}

#table{

    min-height:150px;

    background:#1e293b;

    border-radius:15px;

    padding:20px;

    margin-bottom:20px;
}

#lastPlayed{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:10px;
}

#hand{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:10px;

    margin-top:20px;
}

.card{

    width:65px;

    height:95px;

    border-radius:12px;

    background:white;

    color:black;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:22px;

    font-weight:bold;

    cursor:pointer;

    user-select:none;

    transition:.2s;
}

.card:hover{

    transform:translateY(-10px);
}

.selected{

    transform:translateY(-20px);

    background:yellow;
}

.red{
    color:red;
}

#gameArea,
#lobbyArea{
    display:none;
}

</style>
</head>
<body>

<div class="container">

<h1>🃏 Tien Len Online</h1>

<div id="loginArea" class="panel">

    <input type="text"
           id="playerName"
           placeholder="ឈ្មោះ">

    <input type="text"
           id="roomId"
           placeholder="លេខបន្ទប់">

    <input type="password"
           id="password"
           placeholder="Password">

    <button class="btn-green"
            onclick="createRoom()">
        Create Room
    </button>

    <button class="btn-blue"
            onclick="joinRoom()">
        Join Room
    </button>

</div>

<div id="lobbyArea" class="panel">

    <h2>
        Room:
        <span id="showRoom"></span>
    </h2>

    <br>

    <div id="lobbyPlayers"></div>

    <button id="startBtn"
            class="btn-green"
            onclick="startGame()">

        🚀 Start Game
    </button>

</div>

<div id="gameArea">

    <div id="status">
        Waiting...
    </div>

    <div id="players"></div>

    <div id="table">

        <h2 style="text-align:center">
            🃏 បៀលើតុ
        </h2>

        <br>

        <div id="lastPlayed"></div>

    </div>

    <div class="panel">

        <h2>🂡 បៀរបស់អ្នក</h2>

        <div id="hand"></div>

        <br>

        <button class="btn-green"
                onclick="playSelected()">

            🃏 ចេញបៀ
        </button>

        <button class="btn-red"
                onclick="passTurn()">

            ⏭️ Pass
        </button>

    </div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let myId = null;

let currentRoom = null;

let myHand = [];

let selectedCards = [];

let playersData = [];

let currentTurnIndex = 0;

function createRoom(){

    const roomId =
        document.getElementById(
            'roomId'
        ).value.trim();

    const password =
        document.getElementById(
            'password'
        ).value;

    const playerName =
        document.getElementById(
            'playerName'
        ).value.trim() || 'Player';

    if(!roomId){

        return alert('បញ្ចូល Room ID');
    }

    socket.emit('createRoom',{

        roomId,
        password,
        playerName
    });
}

function joinRoom(){

    const roomId =
        document.getElementById(
            'roomId'
        ).value.trim();

    const password =
        document.getElementById(
            'password'
        ).value;

    const playerName =
        document.getElementById(
            'playerName'
        ).value.trim() || 'Player';

    if(!roomId){

        return alert('បញ្ចូល Room ID');
    }

    socket.emit('joinRoom',{

        roomId,
        password,
        playerName
    });
}

function startGame(){

    socket.emit(
        'startGame',
        currentRoom
    );
}

function passTurn(){

    selectedCards = [];

    socket.emit(
        'passTurn',
        currentRoom
    );

    document
        .querySelectorAll('.card')
        .forEach(c=>{

            c.classList.remove(
                'selected'
            );
        });
}

function playSelected(){

    if(selectedCards.length === 0){

        return alert('ជ្រើសបៀសិន');
    }

    socket.emit('playCard',{

        roomId:currentRoom,

        cards:[...selectedCards]
    });

    selectedCards = [];

    document
        .querySelectorAll('.card')
        .forEach(c=>{

            c.classList.remove(
                'selected'
            );
        });
}

function renderPlayers(players){

    playersData = players;

    const div =
        document.getElementById(
            'players'
        );

    const lobby =
        document.getElementById(
            'lobbyPlayers'
        );

    div.innerHTML = '';

    lobby.innerHTML = '';

    players.forEach((p,index)=>{

        const el =
            document.createElement('div');

        el.className = 'player';

        if(index === currentTurnIndex){

            el.classList.add('turn');
        }

        el.innerHTML = `
            👤 ${p.name}
            <br>
            🃏 ${p.cardCount || 0}
        `;

        div.appendChild(el);

        const el2 =
            document.createElement('div');

        el2.className = 'player';

        el2.innerHTML =
            `👤 ${p.name}`;

        lobby.appendChild(el2);
    });
}

function renderHand(cards){

    const hand =
        document.getElementById(
            'hand'
        );

    hand.innerHTML = '';

    cards.forEach(card=>{

        const div =
            document.createElement('div');

        div.className = 'card';

        if(
            card.suit === '♥' ||
            card.suit === '♦'
        ){

            div.classList.add('red');
        }

        div.innerHTML =
            `${card.value}${card.suit}`;

        div.onclick = ()=>{

            const exists =
                selectedCards.find(c=>

                    c.value === card.value &&
                    c.suit === card.suit
                );

            if(exists){

                selectedCards =
                    selectedCards.filter(c=>!(

                        c.value === card.value &&
                        c.suit === card.suit
                    ));

                div.classList.remove(
                    'selected'
                );

            }else{

                selectedCards.push(card);

                div.classList.add(
                    'selected'
                );
            }
        };

        hand.appendChild(div);
    });
}

function renderTable(cards){

    const div =
        document.getElementById(
            'lastPlayed'
        );

    div.innerHTML = '';

    cards.forEach(card=>{

        const el =
            document.createElement('div');

        el.className = 'card';

        if(
            card.suit === '♥' ||
            card.suit === '♦'
        ){

            el.classList.add('red');
        }

        el.innerHTML =
            `${card.value}${card.suit}`;

        div.appendChild(el);
    });
}

socket.on('roomCreated',({

    roomId,
    playerId

})=>{

    myId = playerId;

    currentRoom = roomId;

    document.getElementById(
        'loginArea'
    ).style.display = 'none';

    document.getElementById(
        'lobbyArea'
    ).style.display = 'block';

    document.getElementById(
        'showRoom'
    ).innerHTML = roomId;
});

socket.on('roomJoined',({

    roomId,
    playerId

})=>{

    myId = playerId;

    currentRoom = roomId;

    document.getElementById(
        'loginArea'
    ).style.display = 'none';

    document.getElementById(
        'lobbyArea'
    ).style.display = 'block';

    document.getElementById(
        'showRoom'
    ).innerHTML = roomId;
});

socket.on('updatePlayers',(players)=>{

    renderPlayers(players);
});

socket.on('gameStarted',({

    players,
    currentTurnIndex:turn

})=>{

    currentTurnIndex = turn;

    renderPlayers(players);

    document.getElementById(
        'lobbyArea'
    ).style.display = 'none';

    document.getElementById(
        'gameArea'
    ).style.display = 'block';
});

socket.on('dealCards',({

    hand

})=>{

    myHand = hand;

    renderHand(myHand);
});

socket.on('cardPlayed',({

    by,
    cards,
    currentTurnIndex:turn,
    updatedHands

})=>{

    currentTurnIndex = turn;

    renderPlayers(updatedHands);

    renderTable(cards);

    document.getElementById(
        'status'
    ).innerHTML =
        `🃏 ${by} ចេញបៀ`;

    myHand = myHand.filter(myCard=>{

        return !cards.some(c=>

            c.value === myCard.value &&
            c.suit === myCard.suit
        );
    });

    renderHand(myHand);
});

socket.on('turnChanged',({

    currentTurnIndex:turn

})=>{

    currentTurnIndex = turn;

    renderPlayers(playersData);
});

socket.on('clearTable',()=>{

    document.getElementById(
        'lastPlayed'
    ).innerHTML = '';
});

socket.on('gameStatus',(msg)=>{

    document.getElementById(
        'status'
    ).innerHTML = msg;
});

socket.on('gameWon',({

    winner

})=>{

    alert(`🎉 ${winner} ឈ្នះ!`);

    location.reload();
});

socket.on('errorMsg',(msg)=>{

    alert(msg);
});

</script>

</body>
</html>
