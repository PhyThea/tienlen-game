<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🃏 Card Games Online</title>
<style>
/* រក្សាសោភ័ណភាព CSS ចាស់ទាំងអស់របស់អ្នក */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: Arial, sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
.container { max-width: 1200px; margin: auto; padding: 15px; }
h1 { text-align: center; margin-bottom: 20px; }
.panel { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; background: #334155; color: white; }
button { padding: 12px 20px; margin-top: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.2s ease, transform 0.1s ease; }
button:active { transform: scale(0.98); }
button:disabled { background: #475569 !important; color: #94a3b8 !important; cursor: not-allowed; opacity: 0.6; }
.btn-blue { background: #3b82f6; color: white; } .btn-blue:hover:not(:disabled) { background: #2563eb; }
.btn-green { background: #22c55e; color: white; } .btn-green:hover:not(:disabled) { background: #16a34a; }
.btn-red { background: #ef4444; color: white; } .btn-red:hover:not(:disabled) { background: #dc2626; }
.room-item { background: #334155; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
#gameArea { display: none; position: relative; width: 100%; height: 100%; }
@media screen and (max-width: 932px) and (orientation: portrait) { body.in-game { overflow: hidden; position: fixed; width: 100vw; height: 100vh; } body.in-game .container { padding: 0; max-width: 100%; } body.in-game #gameArea { position: fixed; top: 50%; left: 50%; width: 100vh; height: 100vw; transform: translate(-50%, -50%) rotate(90deg); background: #0f172a; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; } }
@media screen and (min-width: 600px) and (orientation: landscape), screen and (min-width: 933px) { body.in-game #gameArea { display: grid; grid-template-rows: auto 1fr auto auto; height: 92vh; max-height: 700px; gap: 10px; } }
.game-header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 8px 15px; border-radius: 10px; }
#players { display: flex; gap: 10px; justify-content: center; align-items: center; width: 100%; flex-wrap: wrap; }
.player { background: #334155; padding: 6px 10px; border-radius: 10px; min-width: 100px; flex: 1; max-width: 150px; position: relative; border: 2px solid transparent; text-align: center; font-size: 13px; }
.player.active-turn { border: 2px solid #22c55e !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.6) !important; }
.player-passed { background: #451a1a !important; border: 2px solid #ef4444 !important; opacity: 0.6; }
.card-counter { margin-top: 4px; background: #1e293b; border-radius: 5px; padding: 2px 5px; font-weight: bold; font-size: 11px; color: #f59e0b; display: inline-block; }
.table-area { background: #14532d; border: 2px dashed #22c55e; border-radius: 12px; flex: 1; min-height: 110px; display: flex; justify-content: center; align-items: center; gap: 6px; padding: 10px; }
.hand-and-controls { display: flex; flex-direction: column; gap: 8px; background: #1e293b; padding: 10px; border-radius: 12px; }
.card-container { display: flex; justify-content: center; overflow-x: auto; padding: 10px 0; }
.card { background: white; color: black; width: 52px; height: 76px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px 6px; font-size: 15px; font-weight: bold; cursor: pointer; user-select: none; box-shadow: -2px 3px 5px rgba(0,0,0,0.3); margin-right: -12px; }
.card:last-child { margin-right: 0; }
.card.red { color: #ef4444; }
.card.selected { transform: translateY(-15px); box-shadow: 0 5px 10px #3b82f6; border: 2px solid #3b82f6; margin-right: -6px; }
.card.disabled-card { opacity: 0.4; cursor: not-allowed; }
.table-card { background: white; color: black; width: 52px; height: 76px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px 6px; font-size: 15px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.4); }
.table-card.red { color: #ef4444; }
.controls { display: flex; gap: 10px; } .controls button { margin-top: 0; padding: 10px; font-size: 15px; }
#resultArea { display: none; text-align: center; }
.result-player { background: #334155; padding: 12px; border-radius: 10px; margin-top: 10px; text-align: left; }
</style>
</head>
<body>

<div class="container">
    <div id="loginArea" class="panel">
        <h1>🃏 Multi-Games Online</h1>
        <input type="text" id="playerName" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក...">
        <div style="margin-top: 15px;">
            <select id="gameTypeSelect">
                <option value="tienlen">លេងទៀនឡេន (Tien Len) [២-៤នាក់]</option>
                <option value="catte">លេងកាតេ (Catte) [២-៦នាក់]</option>
            </select>
            <input type="text" id="roomInput" placeholder="លេខបន្ទប់ (Room ID)...">
            <input type="password" id="roomPass" placeholder="លេខកូដសម្ងាត់បន្ទប់ (បើគ្មាន ទុកទទេ)...">
            <div style="display: flex; gap: 10px;">
                <button class="btn-blue" onclick="createRoom()">➕ បង្កើតបន្ទប់ថ្មី</button>
                <button class="btn-green" onclick="joinRoom()">🚪 ចូលរួមបន្ទប់</button>
            </div>
        </div>
        <hr style="margin-top: 20px; border-color: #334155;">
        <h3 style="margin-top: 15px;">🏰 បញ្ជីបន្ទប់កំពុងរង់ចាំ៖</h3>
        <div id="roomList"></div>
    </div>

    <div id="lobbyArea" class="panel" style="display: none;">
        <h1>🃏 Lobby Area</h1>
        <h2>Room: <span id="showRoom" style="color: #3b82f6;"></span> (<span id="showGameType" style="color: #eab308;"></span>)</h2>
        <br>
        <div id="lobbyPlayers" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;"></div>
        <button id="startBtn" class="btn-green" onclick="startGame()" style="display: none;">🚀 Start Game</button>
        <button class="btn-red" onclick="leaveRoom()">🚪 ចាកចេញ (Leave)</button>
    </div>

    <div id="gameArea">
        <div class="game-header">
            <div id="status" style="font-weight: bold; color: #22c55e;">Waiting...</div>
            <button class="btn-red" onclick="leaveRoom()" style="margin-top: 0; padding: 6px 12px; font-size: 13px; width: auto;">🚪 ផ្ទះដើម</button>
        </div>
        <div id="players"></div>
        <div class="table-area" id="table">
            <div style="color: #a7f3d0;">មិនទាន់មានបៀរចុះឡើយ</div>
        </div>
        <div class="hand-and-controls">
            <div class="card-container" id="myCards"></div>
            <div class="controls" id="actionControls">
                <button id="playBtn" class="btn-green" onclick="playSelectedCards()">🎯 ចុះបៀរ / កាត់ទឹក</button>
                <button id="passBtn" class="btn-red" onclick="passTurn()">❌ រំលង (Pass)</button>
            </div>
        </div>
    </div>

    <div id="resultArea" class="panel">
        <h2 style="color: #22c55e;">🎉 ជ័យជម្នះបានទៅលើ៖ <span id="winnerName"></span></h2>
        <br>
        <div id="resultList"></div>
        <br>
        <button id="hostPlayAgainBtn" class="btn-green" onclick="startGame()" style="display: none;">🔄 លេងម្ដងទៀត</button>
        <div id="waitHostText" style="color: #94a3b8; margin-top: 15px;">សូមរង់ចាំ Host...</div>
        <button class="btn-red" onclick="leaveRoom()">🚪 ចូលរួមបន្ទប់ថ្មី</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myId = null, currentRoom = null, isCreator = false, myHand = [], selectedCards = [], currentTurnIndex = 0, playersData = [], currentGameType = 'tienlen';

socket.on('roomList', (rooms) => {
    const div = document.getElementById('roomList'); div.innerHTML = '';
    if (rooms.length === 0) { div.innerHTML = '<div style="color: #64748b; margin-top: 10px;">មិនទាន់មានបន្ទប់...</div>'; return; }
    rooms.forEach(r => {
        const item = document.createElement('div'); item.className = 'room-item';
        const gameLabel = r.gameType === 'catte' ? 'កាតេ (Catte)' : 'ទៀនឡេន';
        const maxP = r.gameType === 'catte' ? 6 : 4;
        item.innerHTML = `<div><strong>បន្ទប់ ID: ${r.roomId} (${gameLabel})</strong><br><small style="color: #94a3b8;">សមាជិក៖ ${r.playerCount}/${maxP} នាក់</small></div>
            <button class="btn-blue" style="width: auto; margin-top: 0; padding: 6px 12px;" onclick="quickJoin('${r.roomId}', ${r.hasPassword})">ចូលរួម</button>`;
        div.appendChild(item);
    });
});

function quickJoin(roomId, hasPassword) {
    document.getElementById('roomInput').value = roomId;
    if (hasPassword) { const pass = prompt("សូមបញ្ចូលលេខកូដសម្ងាត់៖"); if (pass !== null) document.getElementById('roomPass').value = pass; }
    joinRoom();
}

function getPlayerName() {
    const name = document.getElementById('playerName').value.trim();
    if (!name) { alert("សូមបញ្ចូលឈ្មោះរបស់អ្នក!"); return null; }
    return name;
}

function createRoom() {
    const playerName = getPlayerName(); if (!playerName) return;
    const roomId = document.getElementById('roomInput').value.trim();
    const password = document.getElementById('roomPass').value;
    const gameType = document.getElementById('gameTypeSelect').value;
    if (!roomId) return alert("សូមបញ្ចូលលេខបន្ទប់!");
    socket.emit('createRoom', { roomId, password, playerName, gameType });
}

function joinRoom() {
    const playerName = getPlayerName(); if (!playerName) return;
    const roomId = document.getElementById('roomInput').value.trim();
    const password = document.getElementById('roomPass').value;
    if (!roomId) return alert("សូមបញ្ចូលលេខបន្ទប់!");
    socket.emit('joinRoom', { roomId, password, playerName });
}

socket.on('roomCreated', ({ roomId, playerId }) => { myId = playerId; currentRoom = roomId; isCreator = true; showLobby(roomId); });
socket.on('roomJoined', ({ roomId, playerId }) => { myId = playerId; currentRoom = roomId; isCreator = false; showLobby(roomId); });

function showLobby(roomId) {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('showRoom').innerText = roomId;
}

socket.on('updatePlayers', (players) => {
    playersData = players;
    if(players.length > 0) isCreator = (players[0].id === myId);
    const lobby = document.getElementById('lobbyPlayers'); lobby.innerHTML = '';
    players.forEach(p => {
        const el = document.createElement('div'); el.className = 'player';
        el.innerHTML = `👤 ${p.name} ${p.id === myId ? '(ខ្ញុំ)' : ''}`;
        lobby.appendChild(el);
    });
    document.getElementById('startBtn').style.display = isCreator ? 'inline-block' : 'none';
});

function startGame() { socket.emit('startGame', currentRoom); }

socket.on('gameStarted', ({ players, currentTurnIndex: turn, gameType }) => {
    currentTurnIndex = turn; playersData = players; currentGameType = gameType;
    document.getElementById('showGameType').innerText = gameType === 'catte' ? 'Catte' : 'Tien Len';
    document.getElementById('lobbyArea').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('passBtn').style.display = gameType === 'catte' ? 'none' : 'inline-block'; // កាតេមិនបាច់មានប៊ូតុង Pass ទេ
    renderPlayers(players);
    updateControlsState();
});

socket.on('dealCards', ({ hand }) => { myHand = hand; selectedCards = []; renderMyCards(); });

function isMyTurn() { return playersData[currentTurnIndex] && playersData[currentTurnIndex].id === myId; }

function updateControlsState() {
    document.getElementById('playBtn').disabled = !isMyTurn();
    document.getElementById('passBtn').disabled = !isMyTurn();
}

function renderPlayers(players) {
    const div = document.getElementById('players'); div.innerHTML = '';
    players.forEach((p, index) => {
        const el = document.createElement('div'); el.className = 'player';
        if (index === currentTurnIndex && p.hand.length > 0) el.classList.add('active-turn');
        if (p.passed) el.classList.add('player-passed');
        
        let info = p.hand ? p.hand.length : 0;
        if(p.rank === 1) info = "👑 លេខ ១";
        else if (p.rank > 1) info = "🥈 ចាញ់";
        
        el.innerHTML = `<strong>👤 ${p.name.substring(0,8)}</strong><br><span class="card-counter">🃏 ${info} សន្លឹក</span>`;
        div.appendChild(el);
    });
}

function renderMyCards() {
    const div = document.getElementById('myCards'); div.innerHTML = '';
    myHand.forEach(card => {
        const el = document.createElement('div');
        const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
        const isSelected = selectedCards.some(c => c.value === card.value && c.suit === card.suit);
        el.className = `card ${isRed} ${isSelected ? 'selected' : ''}`;
        el.innerHTML = `<div>${card.value}</div><div style="align-self:center;font-size:20px;">${card.suit}</div><div style="align-self:flex-end;transform:rotate(180deg);">${card.value}</div>`;
        el.onclick = () => {
            if (!isMyTurn()) return;
            if (currentGameType === 'catte') { selectedCards = [card]; } else {
                const idx = selectedCards.findIndex(c => c.value === card.value && c.suit === card.suit);
                if (idx === -1) selectedCards.push(card); else selectedCards.splice(idx, 1);
            }
            renderMyCards();
        };
        div.appendChild(el);
    });
}

function playSelectedCards() {
    if (selectedCards.length === 0) return alert("សូមជ្រើសរើសសន្លឹកបៀរ!");
    socket.emit('playCard', { roomId: currentRoom, cards: selectedCards });
}

function passTurn() { socket.emit('passTurn', currentRoom); }

socket.on('cardPlayed', ({ by, cards, nextTurn, updatedHands }) => {
    currentTurnIndex = nextTurn; playersData = updatedHands;
    const me = updatedHands.find(p => p.id === myId); if (me && me.hand) myHand = me.hand;
    renderPlayers(updatedHands); updateControlsState(); selectedCards = []; renderMyCards();
    
    const tableDiv = document.getElementById('table'); tableDiv.innerHTML = '';
    cards.forEach(card => {
        const el = document.createElement('div'); const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
        el.className = `table-card ${isRed}`;
        el.innerHTML = `<div>${card.value}</div><div style="align-self:center;font-size:20px;">${card.suit}</div><div style="align-self:flex-end;transform:rotate(180deg);">${card.value}</div>`;
        tableDiv.appendChild(el);
    });
});

socket.on('clearTable', () => { document.getElementById('table').innerHTML = '<div style="color: #64748b;">តុត្រូវបានសម្អាត! ទឹកថ្មី...</div>'; });
socket.on('errorMsg', (msg) => { alert("⚠️ " + msg); });

socket.on('gameWon', ({ winner, allHands }) => {
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('winnerName').innerText = winner;
    
    const resList = document.getElementById('resultList'); resList.innerHTML = '';
    allHands.forEach(p => {
        const div = document.createElement('div'); div.className = 'result-player';
        div.innerHTML = `<strong>👤 ${p.name}</strong> - ${p.rank === 1 ? '🏆 អ្នកឈ្នះ' : '❌ អ្នកចាញ់'}`;
        resList.appendChild(div);
    });
    document.getElementById('hostPlayAgainBtn').style.display = isCreator ? 'block' : 'none';
});

function leaveRoom() { if (confirm("តើអ្នកចង់ចាកចេញមែនទេ?")) { socket.emit('leaveRoom'); window.location.reload(); } }
</script>
</body>
</html>
