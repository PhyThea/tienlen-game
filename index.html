<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tien Len Online - Voice Chat</title>
    <style>
        body { font-family: 'Khmer OS', sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; text-align: center; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        
        /* Buttons & Inputs */
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:active { transform: scale(0.95); }
        button.green { background: #27ae60; }
        button.blue { background: #2980b9; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 70%; margin-bottom: 10px; }

        /* Game Area */
        #gameArea { display: none; background: #27ae60; min-height: 100vh; position: relative; padding-bottom: 80px; }
        .player-info { background: rgba(0,0,0,0.5); padding: 5px; margin: 5px; border-radius: 5px; display: inline-block; width: 45%; }
        .active-turn { border: 2px solid #f1c40f; background: rgba(241, 196, 15, 0.3); }
        
        /* Cards */
        .card { display: inline-block; width: 50px; height: 75px; background: white; color: black; border-radius: 5px; margin: 2px; line-height: 75px; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .card.selected { transform: translateY(-15px); border: 2px solid blue; }
        .card.red { color: red; }
        
        /* Table Cards */
        #tableCards { min-height: 80px; background: rgba(0,0,0,0.2); margin: 10px 0; border-radius: 10px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; }

        /* Voice Button */
        #micBtn { position: fixed; top: 10px; right: 10px; z-index: 1000; background: #ff4444; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; padding: 0; line-height: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* Modal/Overlay */
        #lobbyArea { padding-top: 50px; }
        .room-item { background: #34495e; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Voice Button (Floating) -->
    <button id="micBtn" onclick="toggleMic()">🎙️</button>
    <!-- Hidden Audio Element for Remote Voice -->
    <audio id="remoteAudio" autoplay></audio>

    <!-- LOBBY AREA -->
    <div id="lobbyArea" class="container">
        <h1>🃏 Tien Len Online</h1>
        
        <div id="loginSection">
            <input type="text" id="playerName" placeholder="ឈ្មោះអ្នកលេង..." value="Player">
            <br>
            <button class="green" onclick="createRoom()">➕ បង្កើតបន្ទប់ថ្មី</button>
            <hr>
            <input type="text" id="roomIdInput" placeholder="លេខបន្ទប់...">
            <input type="password" id="roomPassword" placeholder="លេខសម្ងាត់ (បើមាន)">
            <br>
            <button class="blue" onclick="joinRoom()">🚪 ចូលរួមបន្ទប់</button>
        </div>

        <h3>🏰 បញ្ជីបន្ទប់កំពុងរង់ចាំ៖</h3>
        <div id="roomList"></div>
    </div>

    <!-- GAME AREA -->
    <div id="gameArea">
        <div style="padding: 10px;">
            <span id="roomDisplay" style="font-weight:bold; color:#f1c40f;"></span>
            <button onclick="leaveRoom()" style="float:right; padding: 5px 10px; font-size:12px;">🚪 ចាកចេញ</button>
        </div>

        <!-- Other Players -->
        <div id="playersContainer"></div>

        <!-- Table Cards -->
        <div style="text-align:center; margin-top:10px;">
            <div id="statusMessage" style="color: yellow; font-weight: bold;">Waiting...</div>
            <div id="tableCards"></div>
        </div>

        <!-- My Hand -->
        <div style="position: fixed; bottom: 60px; width: 100%; text-align: center; overflow-x: auto; white-space: nowrap; padding: 10px 0; background: rgba(0,0,0,0.1);">
            <div id="myHand"></div>
        </div>

        <!-- Controls -->
        <div style="position: fixed; bottom: 0; width: 100%; background: #2c3e50; padding: 10px; display: flex; justify-content: center; gap: 10px;">
            <button class="green" id="btnPlay" onclick="playCard()">🎯 ចុះបៀរ (Play)</button>
            <button class="blue" id="btnPass" onclick="passTurn()">❌ រំលង (Pass)</button>
            <button id="btnStart" class="green" onclick="startGame()" style="display:none;">🚀 Start Game</button>
            <button id="btnRestart" class="blue" onclick="startGame()" style="display:none;">🔄 លេងម្ដងទៀត</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; text-align:center; padding-top:100px;">
        <h2 style="color:gold; font-size: 30px;">🎉 ជ័យជម្នះបានទៅលើ៖ <span id="winnerName"></span></h2>
        <div id="rankingList" style="text-align:left; max-width:400px; margin:0 auto; color:white;"></div>
        <br>
        <button onclick="closeResult()">បិទ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = '';
        let currentRoom = '';
        let myHand = [];
        let selectedCards = [];
        let isMyTurn = false;

        // --- VOICE CHAT LOGIC (iOS Compatible) ---
        let localStream;
        let peerConnections = {};
        const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        let audioContext;
        let isMicEnabled = false;

        // 1. ប៊ូតុងបើក/បិទ Mic (ត្រូវតែមានសម្រាប់ iPhone)
        function toggleMic() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Resume AudioContext if suspended (Required for iOS)
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (isMicEnabled) {
                // Turn Off
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                document.getElementById('micBtn').innerText = "🎙️";
                document.getElementById('micBtn').style.backgroundColor = "#ff4444";
                isMicEnabled = false;
            } else {
                // Turn On
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(stream => {
                        localStream = stream;
                        isMicEnabled = true;
                        document.getElementById('micBtn').innerText = "🎙️";
                        document.getElementById('micBtn').style.backgroundColor = "#4CAF50";
                        
                        // Re-setup connections for existing peers if any
                        Object.keys(peerConnections).forEach(peerId => {
                            setupPeerConnection(peerId);
                        });
                    })
                    .catch(err => {
                        console.error("Error accessing mic:", err);
                        alert("សូមអនុញ្ញាតឱ្យប្រើ Microphone ក្នុង Setting របស់ iPhone!");
                    });
            }
        }

        // 2. បង្កើត Connection ទៅកាន់ Peer ថ្មី
        function setupPeerConnection(peerId) {
            if (peerConnections[peerId]) return;

            const pc = new RTCPeerConnection(servers);
            peerConnections[peerId] = pc;

            // Send ICE candidates
            pc.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit('voice_signal', {
                        to: peerId,
                        signal: event.candidate
                    });
                }
            };

            // Add local stream if mic is on
            if (localStream && isMicEnabled) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }

            // Receive remote stream
            pc.ontrack = event => {
                const remoteAudio = document.getElementById('remoteAudio');
                if (remoteAudio.srcObject !== event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(e => console.log("Auto-play prevented", e));
                }
            };

            // Create Offer if I am the one joining later or if logic requires
            if (isMicEnabled) {
                 pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .then(() => {
                        socket.emit('voice_signal', {
                            to: peerId,
                            signal: pc.localDescription
                        });
                    });
            }
        }

        // 3. ដោះស្រាយ Signal ដែលទទួលបាន
        socket.on('voice_signal', async (data) => {
            let pc = peerConnections[data.from];
            if (!pc) {
                pc = new RTCPeerConnection(servers);
                peerConnections[data.from] = pc;
                
                pc.onicecandidate = event => {
                    if (event.candidate) {
                        socket.emit('voice_signal', {
                            to: data.from,
                            signal: event.candidate
                        });
                    }
                };

                if (localStream && isMicEnabled) {
                    localStream.getTracks().forEach(track => {
                        pc.addTrack(track, localStream);
                    });
                }

                pc.ontrack = event => {
                    const remoteAudio = document.getElementById('remoteAudio');
                    if (remoteAudio.srcObject !== event.streams[0]) {
                        remoteAudio.srcObject = event.streams[0];
                        remoteAudio.play().catch(e => console.log("Auto-play prevented", e));
                    }
                };
            }

            try {
                if (data.signal.type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit('voice_signal', {
                        to: data.from,
                        signal: pc.localDescription
                    });
                } else if (data.signal.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                } else {
                    await pc.addIceCandidate(new RTCIceCandidate(data.signal));
                }
            } catch (e) {
                console.error("Voice signal error:", e);
            }
        });

        // 4. ដោះស្រាយករណីមានអ្នកចូលថ្មី
        socket.on('voice_user_joined', (data) => {
            setupPeerConnection(data.id);
        });

        // 5. ដោះស្រាយករណីអ្នកចាកចេញ
        socket.on('voice_user_left', (data) => {
            if (peerConnections[data.id]) {
                peerConnections[data.id].close();
                delete peerConnections[data.id];
            }
        });
        // --- END VOICE CHAT LOGIC ---


        // --- GAME LOGIC ---

        socket.on('connect', () => {
            myId = socket.id;
        });

        socket.on('roomList', (rooms) => {
            const list = document.getElementById('roomList');
            list.innerHTML = '';
            rooms.forEach(r => {
                const div = document.createElement('div');
                div.className = 'room-item';
                div.innerHTML = `
                    <span>Room: ${r.roomId} (${r.playerCount}/4) ${r.hasPassword ? '🔒' : ''}</span>
                    <button class="blue" onclick="quickJoin('${r.roomId}')">Join</button>
                `;
                list.appendChild(div);
            });
        });

        socket.on('roomCreated', (data) => {
            enterGameUI(data.roomId);
        });

        socket.on('roomJoined', (data) => {
            enterGameUI(data.roomId);
            if(data.playedCards && data.playedCards.length > 0) {
                renderTableCards(data.playedCards);
            }
        });

        socket.on('updatePlayers', (players) => {
            const container = document.getElementById('playersContainer');
            container.innerHTML = '';
            players.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'player-info';
                if (p.id === myId) div.style.border = "2px solid white";
                div.innerHTML = `
                    <div>${p.name} ${p.id === myId ? '(You)' : ''}</div>
                    <div>🃏 ${p.hand.length} cards</div>
                    ${p.rank ? `<div style="color:gold">Rank: ${p.rank}</div>` : ''}
                `;
                container.appendChild(div);
            });
        });

        socket.on('dealCards', (data) => {
            myHand = data.hand;
            renderMyHand();
        });

        socket.on('gameStarted', (data) => {
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('statusMessage').innerText = "Game Started! Turn: " + data.players[data.currentTurnIndex].name;
            updateTurnUI(data.currentTurnIndex);
        });

        socket.on('turnChanged', (data) => {
            updateTurnUI(data.currentTurnIndex);
        });

        socket.on('cardPlayed', (data) => {
            renderTableCards(data.cards);
            document.getElementById('statusMessage').innerText = `${data.by} played.`;
            // Update hand counts from updatedHands if available, or just rely on dealCards for self
            if(data.updatedHands) {
                 // Logic to update other players' card count could go here
            }
        });

        socket.on('clearTable', (data) => {
            document.getElementById('tableCards').innerHTML = '';
            document.getElementById('statusMessage').innerText = `New Round! ${data.nextPlayer}'s turn.`;
        });

        socket.on('playerPassed', (data) => {
            document.getElementById('statusMessage').innerText = `${data.name} Passed ❌`;
        });

        socket.on('errorMsg', (msg) => {
            alert(msg);
        });

        socket.on('gameWon', (data) => {
            document.getElementById('winnerName').innerText = data.winner;
            const list = document.getElementById('rankingList');
            list.innerHTML = '';
            // Simple ranking display based on allHands if needed, or just show winner
            document.getElementById('resultModal').style.display = 'block';
            
            if(data.winnerId === myId) {
                document.getElementById('btnRestart').style.display = 'inline-block';
            } else {
                document.getElementById('btnRestart').style.display = 'none';
            }
        });

        // Helper Functions
        function createRoom() {
            const name = document.getElementById('playerName').value;
            const roomId = Math.floor(Math.random() * 10000).toString();
            socket.emit('createRoom', { roomId, password: '', playerName: name });
        }

        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value;
            const password = document.getElementById('roomPassword').value;
            const name = document.getElementById('playerName').value;
            if(!roomId) return alert("Please enter Room ID");
            socket.emit('joinRoom', { roomId, password, playerName: name });
        }

        function quickJoin(roomId) {
            const name = document.getElementById('playerName').value;
            socket.emit('joinRoom', { roomId, password: '', playerName: name });
        }

        function enterGameUI(roomId) {
            currentRoom = roomId;
            document.getElementById('lobbyArea').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('roomDisplay').innerText = "Room: " + roomId;
        }

        function leaveRoom() {
            socket.emit('leaveRoom');
            location.reload();
        }

        function startGame() {
            socket.emit('startGame', currentRoom);
        }

        function renderMyHand() {
            const container = document.getElementById('myHand');
            container.innerHTML = '';
            myHand.forEach((card, index) => {
                const cDiv = document.createElement('div');
                cDiv.className = `card ${['♥','♦'].includes(card.suit) ? 'red' : ''}`;
                cDiv.innerText = `${card.value}${card.suit}`;
                cDiv.onclick = () => toggleSelect(index, cDiv);
                container.appendChild(cDiv);
            });
        }

        function toggleSelect(index, element) {
            if (selectedCards.includes(index)) {
                selectedCards = selectedCards.filter(i => i !== index);
                element.classList.remove('selected');
            } else {
                selectedCards.push(index);
                element.classList.add('selected');
            }
        }

        function playCard() {
            if (selectedCards.length === 0) return alert("Select cards first!");
            const cardsToPlay = selectedCards.map(i => myHand[i]);
            socket.emit('playCard', { roomId: currentRoom, cards: cardsToPlay });
            // Optimistic update or wait for server? Wait for server to confirm.
            // Remove selected from local hand visually only after confirmation? 
            // For simplicity, we wait for 'dealCards' or 'cardPlayed' to refresh state if needed, 
            // but usually we need to remove them locally immediately for smooth UI.
            // Let's filter them out locally:
            myHand = myHand.filter((_, i) => !selectedCards.includes(i));
            selectedCards = [];
            renderMyHand();
        }

        function passTurn() {
            socket.emit('passTurn', currentRoom);
        }

        function renderTableCards(cards) {
            const container = document.getElementById('tableCards');
            container.innerHTML = '';
            cards.forEach(card => {
                const cDiv = document.createElement('div');
                cDiv.className = `card ${['♥','♦'].includes(card.suit) ? 'red' : ''}`;
                cDiv.innerText = `${card.value}${card.suit}`;
                container.appendChild(cDiv);
            });
        }

        function updateTurnUI(index) {
            // Highlight active player logic can be added here
            const players = document.querySelectorAll('.player-info');
            // This is a simple check, might need refinement based on DOM order
        }

        function closeResult() {
            document.getElementById('resultModal').style.display = 'none';
        }
    </script>
</body>
</html>
