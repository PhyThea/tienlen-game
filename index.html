<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobby - ហ្គេមបៀរ Online</title>
<script src="/socket.io/socket.io.js"></script>
<style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
    .box { max-width: 500px; margin: auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box;}
    button { background: #22c55e; color: white; cursor: pointer; font-weight: bold; }
    .room-item { background: #334155; padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .join-btn { width: auto; background: #38bdf8; margin: 0; padding: 8px 15px; }
</style>
</head>
<body>
<div class="box">
    <h2>🎭 ស្វាគមន៍មកកាន់ហ្គេមបៀរ Online</h2>
    <input type="text" id="playerName" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក...">
    <hr style="margin: 20px 0; border-color: #334155;">
    
    <h3>➕ បង្កើតបន្ទប់ថ្មី</h3>
    <select id="gameType">
        <option value="tienlen">🃏 ហ្គេមទៀនឡេន (Tien Len)</option>
        <option value="catte">🎴 ហ្គេមកាតេ (Catte)</option>
    </select>
    <input type="text" id="roomId" placeholder="លេខសម្គាល់បន្ទប់ (Room ID)">
    <input type="password" id="roomPass" placeholder="លេខកូដសម្ងាត់ (មិនកក់ក៏បាន)">
    <button onclick="createRoom()">បង្កើតបន្ទប់</button>
    
    <h3 style="margin-top: 30px;">🚪 បន្ទប់កំពុងបើកស្រាប់</h3>
    <div id="roomListArea"></div>
</div>

<script>
    const socket = io();

    function createRoom() {
        const name = document.getElementById('playerName').value.trim();
        const rId = document.getElementById('roomId').value.trim();
        const pass = document.getElementById('roomPass').value;
        const gType = document.getElementById('gameType').value;
        if(!name || !rId) return alert("សូមបញ្ចូលឈ្មោះ និង លេខសម្គាល់បន្ទប់!");
        
        sessionStorage.setItem('playerName', name);
        socket.emit('createRoom', { roomId: rId, password: pass, playerName: name, gameType: gType });
    }

    socket.on('roomCreated', ({ roomId, gameType }) => {
        window.location.href = `/${gameType}?room=${roomId}`;
    });

    socket.on('roomJoined', ({ roomId, gameType }) => {
        window.location.href = `/${gameType}?room=${roomId}`;
    });

    socket.on('roomList', (rooms) => {
        const area = document.getElementById('roomListArea');
        area.innerHTML = rooms.length === 0 ? '<p style="color:#64748b; margin-top:10px;">មិនទាន់មានបន្ទប់នៅឡើយទេ</p>' : '';
        rooms.forEach(r => {
            area.innerHTML += `
                <div class="room-item">
                    <div>
                        <b>ID: ${r.roomId}</b> (${r.gameType === 'tienlen'?'ទៀនឡេន':'កាតេ'})<br>
                        <small style="color:#94a3b8">អ្នកលេង: ${r.playerCount} នាក់ | ស្ថានភាព: ${r.status}</small>
                    </div>
                    <button class="join-btn" onclick="joinRoom('${r.roomId}', ${r.hasPassword})">ចូលរួម</button>
                </div>
            `;
        });
    });

    function joinRoom(rId, hasPass) {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return alert("សូមបញ្ចូលឈ្មោះរបស់អ្នកមុននឹងចូលលេង!");
        let pass = "";
        if(hasPass) {
            pass = prompt("សូមបញ្ចូលលេខកូដសម្ងាត់បន្ទប់៖");
            if(pass === null) return;
        }
        sessionStorage.setItem('playerName', name);
        socket.emit('joinRoom', { roomId: rId, password: pass, playerName: name });
    }

    socket.on('errorMsg', msg => alert(msg));
</script>
</body>
</html>
