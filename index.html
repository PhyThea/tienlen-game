<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Lobby បន្ទប់ហ្គេម</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <h1>Lobby បន្ទប់កាតហ្គេម</h1>
    
    <div id="setupRoom">
        <input type="text" id="playerName" placeholder="ឈ្មោះរបស់អ្នក">
        <input type="text" id="roomId" placeholder="លេខបន្ទប់">
        <button onclick="createRoom()">បង្កើតបន្ទប់</button>
        <button onclick="joinRoom()">ចូលបន្ទប់</button>
    </div>

    <div id="insideRoom" style="display:none;">
        <h2>បន្ទប់: <span id="roomTitle"></span></h2>
        
        <div id="gameSetting" style="display:none;">
            <label>ជ្រើសរើសប្រភេទហ្គេម៖</label>
            <select id="gameType" onchange="selectGame()">
                <option value="tienlen">ទៀនឡេន (លេង ២-៤ នាក់)</option>
                <option value="catte">កាតេ (លេង ២-៦ នាក់)</option>
            </select>
        </div>

        <div id="playerList"></div>
        <button id="startBtn" style="display:none;" onclick="startGame()">ចាប់ផ្តើមលេង</button>
    </div>

    <script>
        const socket = io();
        let myId, currentRoom;

        function createRoom() {
            const roomId = document.getElementById('roomId').value;
            const playerName = document.getElementById('playerName').value;
            socket.emit('createRoom', { roomId, playerName });
        }

        function joinRoom() {
            const roomId = document.getElementById('roomId').value;
            const playerName = document.getElementById('playerName').value;
            socket.emit('joinRoom', { roomId, playerName });
        }

        function selectGame() {
            const gameType = document.getElementById('gameType').value;
            socket.emit('changeGameType', { roomId: currentRoom, gameType });
        }

        function startGame() {
            socket.emit('startGame', currentRoom);
        }

        socket.on('updateRoomInfo', (room) => {
            currentRoom = room.roomId;
            document.getElementById('setupRoom').style.display = 'none';
            document.getElementById('insideRoom').style.display = 'block';
            document.getElementById('roomTitle').innerText = room.roomId;
            
            // បង្ហាញបញ្ជីឈ្មោះអ្នកលេង
            const list = document.getElementById('playerList');
            list.innerHTML = room.players.map(p => `<div>👤 ${p.name}</div>`).join('');

            // បើជាមេបន្ទប់ ឱ្យបង្ហាញប៊ូតុងរើសហ្គេម និងប៊ូតុង Start
            if (room.creatorId === socket.id) {
                document.getElementById('gameSetting').style.display = 'block';
                document.getElementById('startBtn').style.display = 'block';
            }
        });

        // ពេលទទួលបានបញ្ជាឱ្យទៅទំព័រហ្គេម
        socket.on('goToGamePage', ({ gameType, roomId }) => {
            // យកឈ្មោះដែលវាយក្នុង Input ទៅទុកក្នុង LocalStorage
            const name = document.getElementById('playerNameInput').value || 'Player';
            localStorage.setItem('playerName', name);
            
            // រុញទៅកាន់ទំព័រហ្គេមតាមប្រភេទដែលមេបន្ទប់រើស
            window.location.href = `/${gameType}?room=${roomId}`;
        });
    </script>
</body>
</html>
