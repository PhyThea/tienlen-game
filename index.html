<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🃏 Tien Len Online</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #334155;
    color: white;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    margin-right: 10px;
    font-size: 16px;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

.btn-green { background: #22c55e; color: white; }
.btn-red { background: #ef4444; color: white; }
.btn-blue { background: #3b82f6; color: white; }
.btn-yellow { background: #eab308; color: black; }

#status {
    text-align: center;
    font-size: 22px;
    color: #facc15;
    margin-bottom: 20px;
    font-weight: bold;
}

#players {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.player {
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    min-width: 160px;
    position: relative;
}

.turn {
    border: 3px solid #22c55e;
    box-shadow: 0 0 10px #22c55e;
}

/* រចនាប័ទ្មសម្រាប់បង្ហាញសារអត់ស៊ីនៅលើក្បាលអ្នកលេង */
.pass-bubble {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: #ef4444;
    color: white;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
    white-space: nowrap;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    animation: bounce 0.5s ease infinite alternate;
    z-index: 10;
}

@keyframes bounce {
    from { transform: translateX(-50%) translateY(0); }
    to { transform: translateX(-50%) translateY(-5px); }
}

#table {
    min-height: 150px;
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

#lastPlayed {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

/* ======================================================= */
/* 📱 កូដកែសម្រួលពិសេសសម្រាប់បង្ហាញបៀរមួយជួរលើទូរស័ព្ទដៃ */
/* ======================================================= */
#hand {
    display: flex;
    flex-wrap: nowrap;          /* ការពារដាច់ខាតមិនឱ្យបៀរធ្លាក់ចុះជួរទីពីរ */
    overflow-x: auto;           /* អនុញ្ញាតឱ្យអូសទៅឆ្វេងស្ដាំបាន (Horizontal Scroll) */
    padding: 25px 10px;         /* បន្ថែមចន្លោះពីលើដើម្បីកុំឱ្យទើសពេលចុចជ្រើសរើសបៀររុញឡើងលើ */
    gap: 8px;                   /* គម្លាតរវាងសន្លឹកបៀរនីមួយៗ */
    justify-content: flex-start;/* តម្រៀបបៀរចាប់ផ្ដើមពីខាងឆ្វេងទៅ */
    -webkit-overflow-scrolling: touch; /* អូសលើទូរស័ព្ទដៃកាន់តែរលូន */
}

/* លាក់របារ Scrollbar ដើម្បីឱ្យមើលទៅស្អាត */
#hand::-webkit-scrollbar {
    display: none; 
}

.card {
    flex-shrink: 0;             /* ការពារកុំឱ្យសន្លឹកបៀររួមតូចទៅៗពេលមានបៀរច្រើនក្នុងដៃ */
    width: 60px;                /* ទំហំទទឹងសន្លឹកបៀរល្មមស្អាតលើទូរស័ព្ទ */
    height: 90px;               /* កម្ពស់សន្លឹកបៀរ */
    border-radius: 10px;
    background: white;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;            /* ទំហំអក្សរ និងផ្កាបៀរ */
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: .2s;
    border: 2px solid #ccc;
}

.card:hover {
    transform: translateY(-5px);
}

/* ពេលចុចជ្រើសរើសបៀរ */
.selected {
    transform: translateY(-15px) !important; /* រុញឡើងលើឱ្យច្បាស់ */
    background: #facc15 !important;
    border-color: #eab308;
}

.red {
    color: red;
}

#gameArea, #lobbyArea, #resultArea {
    display: none;
}

/* បង្ហាញបៀដែលសល់ពេលចប់ហ្គេម */
.result-player {
    background: #334155;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
.result-cards {
    display: flex;
    gap: 5px;
    margin-top: 10px;
    flex-wrap: wrap;
}
.result-card {
    width: 45px;
    height: 65px;
    font-size: 14px;
    border-radius: 6px;
    background: white;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>🃏 Tien Len Online</h1>

    <div id="loginArea" class="panel">
        <input type="text" id="playerName" placeholder="ឈ្មោះអ្នកលេង">
        <input type="text" id="roomId" placeholder="លេខបន្ទប់">
        <input type="password" id="password" placeholder="លេខកូដបន្ទប់ (បើគ្មាន មិនបាច់ដាក់)">
        
        <button class="btn-green" onclick="createRoom()">Create Room</button>
        <button class="btn-blue" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="lobbyArea" class="panel">
        <h2>Room: <span id="showRoom" style="color: #3b82f6;"></span></h2>
        <br>
        <div id="lobbyPlayers"></div>
        <button id="startBtn" class="btn-green" onclick="startGame()" style="display: none;">🚀 Start Game</button>
    </div>

    <div id="gameArea">
        <div id="status">Waiting...</div>
        <div id="players"></div>

        <div id="table">
            <h2 style="text-align:center">🃏 បៀលើតុ</h2>
            <br>
            <div id="lastPlayed"></div>
        </div>

        <div class="panel">
            <h2>🂡 បៀរបស់អ្នក</h2>
            <div id="hand"></div>
            <br>
            <button class="btn-green" onclick="playSelected()">🃏 ចេញបៀ</button>
            <button class="btn-red" onclick="passTurn()">⏭️ Pass</button>
        </div>
    </div>

    <div id="resultArea" class="panel">
        <h2 id="resultTitle" style="text-align: center; font-size: 28px; margin-bottom: 10px;">🎉 លទ្ធផលប្រកួត 🎉</h2>
        <h3 id="winnerName" style="text-align: center; margin-top: 10px;"></h3>
        <hr style="margin: 15px 0; border-color: #334155;">
        <div id="allRemainingHands"></div>
        <br>
        <button id="hostPlayAgainBtn" class="btn-green" onclick="backToLobbyOrRestart()" style="display: none; width: 100%;">លេងម្ដងទៀត (Play Again)</button>
        <p id="waitHostText" style="text-align: center; color: #94a3b8; margin-top: 10px;">រង់ចាំ Host ចាប់ផ្ដើមហ្គេមសារជាថ្មី...</p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myId = null;
let currentRoom = null;
let myHand = [];
let selectedCards = [];
let playersData = [];
let currentTurnIndex = 0;
let isCreator = false; 

function createRoom() {
    const roomId = document.getElementById('roomId').value.trim();
    const password = document.getElementById('password').value;
    const playerName = document.getElementById('playerName').value.trim() || 'Player';

    if (!roomId) return alert('បញ្ចូល Room ID');
    
    isCreator = true; 
    socket.emit('createRoom', { roomId, password, playerName });
}

function joinRoom() {
    const roomId = document.getElementById('roomId').value.trim();
    const password = document.getElementById('password').value;
    const playerName = document.getElementById('playerName').value.trim() || 'Player';

    if (!roomId) return alert('បញ្ចូល Room ID');
    
    isCreator = false;
    socket.emit('joinRoom', { roomId, password, playerName });
}

function startGame() {
    socket.emit('startGame', currentRoom);
}

function passTurn() {
    selectedCards = [];
    socket.emit('passTurn', currentRoom);
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
}

function playSelected() {
    if (selectedCards.length === 0) return alert('ជ្រើសរើសបៀជាមុនសិន!');
    
    socket.emit('playCard', {
        roomId: currentRoom,
        cards: [...selectedCards]
    });
    selectedCards = [];
}

function renderPlayers(players) {
    playersData = players;
    const div = document.getElementById('players');
    const lobby = document.getElementById('lobbyPlayers');

    div.innerHTML = '';
    lobby.innerHTML = '';

    players.forEach((p, index) => {
        const el = document.createElement('div');
        el.className = 'player';
        el.id = `player-card-${p.id}`; // ងាយស្រួលរកមើល Element ពេលចង់បង្ហាញពពុះពាក្យ (Pass Bubble)
        if (index === currentTurnIndex) {
            el.classList.add('turn');
        }
        el.innerHTML = `
            👤 ${p.name} ${p.id === myId ? '(ខ្ញុំ)' : ''}
            <br>
            🃏 បៀសល់៖ ${p.hand ? p.hand.length : (p.cardCount || 0)} សន្លឹក
        `;
        div.appendChild(el);

        const el2 = document.createElement('div');
        el2.className = 'player';
        el2.innerHTML = `👤 ${p.name} ${p.id === myId ? '(ខ្ញុំ)' : ''}`;
        lobby.appendChild(el2);
    });

    const startBtn = document.getElementById('startBtn');
    if (isCreator) {
        startBtn.style.display = 'inline-block';
    } else {
        startBtn.style.display = 'none';
    }
}

function renderHand(cards) {
    const hand = document.getElementById('hand');
    hand.innerHTML = '';

    cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        if (card.suit === '♥' || card.suit === '♦') {
            div.classList.add('red');
        }
        div.innerHTML = `${card.value}${card.suit}`;

        div.onclick = () => {
            const exists = selectedCards.find(c => c.value === card.value && c.suit === card.suit);
            if (exists) {
                selectedCards = selectedCards.filter(c => !(c.value === card.value && c.suit === card.suit));
                div.classList.remove('selected');
            } else {
                selectedCards.push(card);
                div.classList.add('selected');
            }
        };
        hand.appendChild(div);
    });
}

function renderTable(cards) {
    const div = document.getElementById('lastPlayed');
    div.innerHTML = '';
    cards.forEach(card => {
        const el = document.createElement('div');
        el.className = 'card';
        if (card.suit === '♥' || card.suit === '♦') {
            el.classList.add('red');
        }
        el.innerHTML = `${card.value}${card.suit}`;
        div.appendChild(el);
    });
}

socket.on('roomCreated', ({ roomId, playerId }) => {
    myId = playerId;
    currentRoom = roomId;
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
    document.getElementById('showRoom').innerHTML = roomId;
});

socket.on('roomJoined', ({ roomId, playerId }) => {
    myId = playerId;
    currentRoom = roomId;
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
    document.getElementById('showRoom').innerHTML = roomId;
});

socket.on('updatePlayers', (players) => {
    renderPlayers(players);
});

socket.on('gameStarted', ({ currentTurnIndex: turn }) => {
    currentTurnIndex = turn;
    selectedCards = [];
    document.getElementById('lastPlayed').innerHTML = '';
    document.getElementById('lobbyArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('status').innerHTML = 'ហ្គេមចាប់ផ្ដើមហើយ!';
});

socket.on('dealCards', ({ hand }) => {
    myHand = hand;
    renderHand(myHand);
});

socket.on('cardPlayed', ({ by, cards, nextTurn, cardCount }) => {
    currentTurnIndex = nextTurn;
    renderTable(cards);
    document.getElementById('status').innerHTML = `🎯 វេនរបស់៖ ${playersData[currentTurnIndex].name}`;
    
    playersData.forEach(p => {
        if (p.name === by) p.cardCount = cardCount;
    });
    renderPlayers(playersData);

    myHand = myHand.filter(myCard => !cards.some(c => c.value === myCard.value && c.suit === myCard.suit));
    renderHand(myHand);
});

// ពេលមានអ្នកលេងចុច Pass៖ បង្ហាញពាក្យ "តោះខ្ញុំអត់ស៊ីទេ" លើក្បាលអ្នកលេងនោះ
socket.on('playerPassed', ({ name, id, message, nextTurn }) => {
    currentTurnIndex = nextTurn;
    renderPlayers(playersData);
    document.getElementById('status').innerHTML = `⏭️ ${name} Pass! វេនបន្ទាប់៖ ${playersData[currentTurnIndex].name}`;

    // បង្កើត Bubble "តោះខ្ញុំអត់ស៊ីទេ" បង្ហាញលើ Card របស់អ្នកលេងដែល Pass
    const playerCard = document.getElementById(`player-card-${id}`);
    if (playerCard) {
        // បើមាន Bubble ចាស់ ត្រូវលុបចេញមុនសិន
        const oldBubble = playerCard.querySelector('.pass-bubble');
        if (oldBubble) oldBubble.remove();

        const bubble = document.createElement('div');
        bubble.className = 'pass-bubble';
        bubble.innerText = message || '💬 តោះខ្ញុំអត់ស៊ីទេ';
        playerCard.appendChild(bubble);

        // បាត់ទៅវិញក្នុងរយៈពេល ២.៥ វិនាទី
        setTimeout(() => {
            bubble.remove();
        }, 2500);
    }
});

socket.on('clearTable', ({ nextPlayer }) => {
    document.getElementById('lastPlayed').innerHTML = '';
    document.getElementById('status').innerHTML = `🆕 ជុំថ្មី! វេនដំបូងគឺ៖ ${nextPlayer}`;
});

// កូដបង្ហាញលទ្ធផលឈ្នះ ឬចាញ់ផ្ទាល់ខ្លួន (ផ្ទៀងផ្ទាត់ជាមួយ ID)
socket.on('gameWon', ({ winner, winnerId, allHands }) => {
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';

    const resultTitle = document.getElementById('resultTitle');
    
    // ១. ត្រួតពិនិត្យថាជា ID របស់យើងផ្ទាល់ ឬក៏អត់ ដើម្បីបង្ហាញសារឈ្នះ/ចាញ់
    if (socket.id === winnerId) {
        resultTitle.innerHTML = `<span style="color: #22c55e; font-size: 32px;">🎉 អ្នកឈ្នះហើយ! 🎉</span>`;
        document.getElementById('winnerName').innerHTML = `🏆 អបអរសាទរ! អ្នកជាម្ចាស់ជើងឯកនៅក្នុងជុំនេះ!`;
    } else {
        resultTitle.innerHTML = `<span style="color: #ef4444; font-size: 32px;">😢 អ្នកចាញ់ហើយ! 😢</span>`;
        document.getElementById('winnerName').innerHTML = `🏆 អ្នកឈ្នះនៅក្នុងជុំនេះគឺ៖ <span style="color: #22c55e;">${winner}</span>`;
    }

    // ២. បង្ហាញកាតបៀរដែលសល់របស់អ្នកលេងទាំងអស់
    const resultDiv = document.getElementById('allRemainingHands');
    resultDiv.innerHTML = '';

    allHands.forEach(p => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'result-player';
        
        let cardsHTML = '';
        if (!p.remaining || p.remaining.length === 0) {
            cardsHTML = `<span style="color: #22c55e; font-weight: bold;">អស់បៀពីដៃ (ឈ្នះ)</span>`;
        } else {
            p.remaining.forEach(card => {
                const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
                cardsHTML += `<div class="result-card ${isRed}">${card.value}${card.suit}</div>`;
            });
        }

        playerDiv.innerHTML = `
            <strong>👤 ${p.name}</strong> (នៅសល់ ${p.remaining ? p.remaining.length : 0} សន្លឹក)
            <div class="result-cards">${cardsHTML}</div>
        `;
        resultDiv.appendChild(playerDiv);
    });

    // ៣. បង្ហាញប៊ូតុងសម្រាប់ Host លេងម្ដងទៀត
    const playAgainBtn = document.getElementById('hostPlayAgainBtn');
    const waitText = document.getElementById('waitHostText');
    if (isCreator) {
        playAgainBtn.style.display = 'block';
        waitText.style.display = 'none';
    } else {
        playAgainBtn.style.display = 'none';
        waitText.style.display = 'block';
    }
});

function backToLobbyOrRestart() {
    socket.emit('startGame', currentRoom); 
}

socket.on('errorMsg', (msg) => {
    alert(msg);
});
</script>
</body>
</html>
