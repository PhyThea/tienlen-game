<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 Cate & Tien Len Online</title>
    <style>
        body { font-family: 'Khmer OS', Arial, sans-serif; background: #1a1a2e; color: #eee; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #16213e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select, button { padding: 10px; margin: 5px; border-radius: 6px; border: none; font-size: 16px; }
        button { cursor: pointer; background: #0f3460; color: white; }
        button:hover { background: #e94560; }
        .room-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 15px 0; }
        .room-card { background: #1f4068; padding: 10px; border-radius: 8px; min-width: 150px; cursor: pointer; }
        .room-card:hover { background: #16213e; border: 2px solid #e94560; }
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; min-height: 100px; }
        .card { width: 60px; height: 90px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; user-select: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .card.selected { transform: translateY(-10px); box-shadow: 0 0 10px #e94560; }
        .red { color: #d90429; }
        .black { color: #2b2d42; }
        #gameArea, #lobby { display: none; }
        .visible { display: block !important; }
        .hidden { display: none !important; }
        #message { color: #ffaa00; min-height: 20px; margin: 10px 0; }
        .player-info { background: #0f3460; padding: 8px; margin: 5px; border-radius: 6px; display: inline-block; min-width: 120px; }
        .table-cards { background: #2d4a22; padding: 10px; border-radius: 8px; min-height: 60px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🃏 Cate & Tien Len Online</h1>
        <div id="message"></div>

        <div id="lobby" class="visible">
            <h3>🏠 បង្កើត ឬ ចូលបន្ទប់</h3>
            <input type="text" id="playerName" placeholder="ឈ្មោះអ្នកលេង" value="Player1">
            <select id="gameMode">
                <option value="cate">កាតេ (Cate - ៦ សន្លឹក)</option>
                <option value="tienlen">ទៀនឡេន (Tien Len - ១៣ សន្លឹក)</option>
            </select>
            <br>
            <button onclick="createRoom()">➕ បង្កើតបន្ទប់</button>
            <input type="text" id="joinRoomId" placeholder="ID បន្ទប់">
            <input type="password" id="joinPass" placeholder="ពាក្យសម្ងាត់ (បើមាន)">
            <button onclick="joinRoom()">🚪 ចូលបន្ទប់</button>

            <h4>📋 បន្ទប់កំពុងរង់ចាំ៖</h4>
            <div class="room-list" id="roomList"></div>
        </div>

        <div id="gameArea">
            <h3 id="roomTitle">បន្ទប់៖ <span id="currentRoomId"></span></h3>
            <div id="playersInfo"></div>
            
            <div class="table-cards" id="tableCards">🎯 តុ៖ មិនទាន់មានបៀរ</div>
            <div id="turnIndicator" style="color:#00ffaa; margin:5px 0;">វេនរបស់៖ <span id="nextPlayer">...</span></div>

            <h4>បៀររបស់អ្នក៖</h4>
            <div class="hand" id="myHand"></div>
            
            <button onclick="playSelected()">🎯 ចុះបៀរ (Play)</button>
            <button onclick="passTurn()">❌ រំលង (Pass)</button>
            <button onclick="startGame()" id="startBtn">🚀 ចាប់ផ្តើម</button>
            <button onclick="leaveRoom()">🚪 ចាកចេញ</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;
        let roomId = null;
        let selectedCards = [];
        let myHand = [];
        let isMyTurn = false;

        function showMsg(msg) { document.getElementById('message').textContent = msg; }

        function updateRoomList(list) {
            const el = document.getElementById('roomList');
            el.innerHTML = '';
            list.forEach(r => {
                const div = document.createElement('div');
                div.className = 'room-card';
                div.innerHTML = `<b>${r.roomId}</b><br>${r.gameMode === 'cate' ? 'កាតេ' : 'ទៀនឡេន'} | 👥 ${r.playerCount}`;
                div.onclick = () => {
                    document.getElementById('joinRoomId').value = r.roomId;
                    document.getElementById('gameMode').value = r.gameMode;
                };
                el.appendChild(div);
            });
        }

        function renderHand(cards) {
            myHand = cards;
            const el = document.getElementById('myHand');
            el.innerHTML = '';
            cards.forEach((c, i) => {
                const div = document.createElement('div');
                const isRed = c.suit === '♥' || c.suit === '♦';
                div.className = `card ${isRed ? 'red' : 'black'}`;
                div.innerHTML = `<span style="font-size:18px">${c.value}</span><span style="font-size:22px">${c.suit}</span>`;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if (div.classList.contains('selected')) selectedCards.push(c);
                    else selectedCards = selectedCards.filter(sc => sc !== c);
                };
                el.appendChild(div);
            });
        }

        function updatePlayers(players) {
            const el = document.getElementById('playersInfo');
            el.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-info';
                div.innerHTML = `👤 ${p.name} <br> 🃏 ${p.hand.length} សន្លឹក ${p.rank ? '| 🏆 ចំណាត់ថ្នាក់: '+p.rank : ''}`;
                el.appendChild(div);
            });
        }

        // Socket Events
        socket.on('connect', () => { myId = socket.id; });
        socket.on('roomList', updateRoomList);
        socket.on('errorMsg', showMsg);

        socket.on('roomCreated', (data) => {
            roomId = data.roomId;
            document.getElementById('currentRoomId').textContent = roomId;
            document.getElementById('lobby').classList.remove('visible');
            document.getElementById('gameArea').classList.add('visible');
            if (data.gameMode !== 'cate') document.getElementById('startBtn').style.display = 'inline-block';
            else document.getElementById('startBtn').style.display = 'none';
            showMsg('✅ បង្កើតបន្ទប់ជោគជ័យ! រង់ចាំអ្នកលេង...');
        });

        socket.on('roomJoined', (data) => {
            roomId = data.roomId;
            document.getElementById('currentRoomId').textContent = roomId;
            document.getElementById('lobby').classList.remove('visible');
            document.getElementById('gameArea').classList.add('visible');
            showMsg('✅ ចូលបន្ទប់ជោគជ័យ!');
        });

        socket.on('updatePlayers', updatePlayers);

        socket.on('dealCards', (data) => {
            renderHand(data.hand);
            showMsg('🎲 ចាប់ផ្តើមហ្គេម!');
        });

        socket.on('gameStarted', (data) => {
            isMyTurn = (data.currentTurnIndex === data.players.findIndex(p => p.id === myId));
            document.getElementById('startBtn').classList.add('hidden');
            showMsg(isMyTurn ? '🟢 វេនរបស់អ្នក!' : '⏳ រង់ចាំវេន...');
        });

        socket.on('turnChanged', (data) => {
            isMyTurn = (data.currentTurnIndex === document.getElementById('playersInfo').children.length - 1); 
            // កែសម្រួលសាមញ្ញ៖ តាមពិតត្រូវ match ID ប៉ុន្តែនៅទីនេះយើង update តាម index ដែល server ផ្ញើ
            const idx = data.currentTurnIndex;
            document.getElementById('nextPlayer').textContent = `វេនទី ${idx + 1}`;
            isMyTurn = (idx === document.getElementById('playersInfo').children.length - 1); 
            // កំណត់វេនតាម UI សាមញ្ញ
            showMsg(isMyTurn ? '🟢 វេនរបស់អ្នក!' : `⏳ វេនរបស់អ្នកលេងទី ${idx+1}`);
        });

        socket.on('cardPlayed', (data) => {
            document.getElementById('tableCards').innerHTML = `<b>${data.by}</b> បានចុះ៖ ${data.cards.map(c => `${c.value}${c.suit}`).join(', ')}`;
            renderHand(data.updatedHands.find(p => p.id === myId)?.hand || []);
            if (data.gameOver) showMsg('🎮 ហ្គេមបញ្ចប់!');
        });

        socket.on('gameWon', (data) => {
            showMsg(`🏆 អ្នកឈ្នះគឺ៖ ${data.winner}`);
            document.getElementById('startBtn').classList.remove('hidden');
        });

        socket.on('clearTable', () => {
            document.getElementById('tableCards').innerHTML = '🎯 តុ៖ មិនទាន់មានបៀរ';
        });

        socket.on('playerPassed', (data) => {
            showMsg(`❌ ${data.name} បានរំលង`);
        });

        // Actions
        function createRoom() {
            const name = document.getElementById('playerName').value || 'Player1';
            const mode = document.getElementById('gameMode').value;
            const id = prompt('បញ្ចូល ID បន្ទប់៖', 'CATE_ROOM');
            const pass = prompt('ពាក្យសម្ងាត់ (ទុកទទេបើគ្មាន)៖', '');
            if (id) socket.emit('createRoom', { roomId: id, password: pass, playerName: name, gameMode: mode });
        }

        function joinRoom() {
            const id = document.getElementById('joinRoomId').value;
            const pass = document.getElementById('joinPass').value;
            const name = document.getElementById('playerName').value || 'Guest';
            const mode = document.getElementById('gameMode').value;
            if (id) socket.emit('joinRoom', { roomId: id, password: pass, playerName: name, gameMode: mode });
        }

        function startGame() {
            if (roomId) socket.emit('startGame', roomId);
        }

        function playSelected() {
            if (!isMyTurn) return showMsg('⛔ មិនមែនវេនអ្នកទេ!');
            if (selectedCards.length === 0) return showMsg('⛔ សូមជ្រើសរើសបៀរ!');
            socket.emit('playCard', { roomId, cards: selectedCards });
            selectedCards = [];
            document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
        }

        function passTurn() {
            if (!isMyTurn) return showMsg('⛔ មិនមែនវេនអ្នកទេ!');
            socket.emit('passTurn', roomId);
        }

        function leaveRoom() {
            socket.emit('leaveRoom');
            location.reload();
        }
    </script>
</body>
</html>
