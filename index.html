<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🃏 Tien Len Pro - Multi-Device</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    width: 100%;
    height: 100%;
    max-width: 1200px;
    margin: auto;
    padding: 10px;
}

h1 {
    text-align: center;
    margin-bottom: 15px;
    font-size: 24px;
}

.panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #334155;
    color: white;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    transition: background 0.2s;
}
button:hover { background: #2563eb; }

/* ==========================================
   🎯 CSS RESPONSIVE & LAYOUT គ្រប់ឧបករណ៍ 
   ========================================== */

/* ហ្គេមប្លង់រួម (Layout) */
.game-layout {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 100%;
    height: 100%;
    padding: 8px;
    background: radial-gradient(circle, #15803d 0%, #14532d 100%);
    border-radius: 12px;
    box-sizing: border-box;
}

/* តុបៀរកណ្ដាល */
#currentPlayZone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    border: 2px dashed rgba(255, 255, 255, 0.15);
    border-radius: 15px;
    margin: 8px 0;
    position: relative;
}

/* បញ្ជីឈ្មោះអ្នកលេងក្នុងបន្ទប់ */
.player-list {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    background: rgba(0,0,0,0.2);
    padding: 6px;
    border-radius: 10px;
}
.player-badge {
    background: #334155;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
}
.player-badge.active-turn {
    background: #f59e0b;
    box-shadow: 0 0 10px #f59e0b;
}

/* បៀរលើដៃ និងបៀរលើតុ */
.card-display, .hand {
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
    padding: 5px;
}
.card {
    width: 48px;
    height: 72px;
    background: white;
    color: black;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.15s;
}
.card.red { color: #ef4444; }
.card.selected { transform: translateY(-15px); border: 2px solid #3b82f6; }

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 5px 0;
}
.controls button { padding: 8px 18px; font-size: 14px; }

/* 📱 សម្រាប់ទូរសព្ទ៖ បើកាន់បញ្ឈរ គឺបង្ខំឱ្យបង្វិលដេកដូច Play Store */
@media screen and (max-width: 768px) and (orientation: portrait) {
    #playScreen {
        position: fixed;
        width: 100vh !important;
        height: 100vw !important;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center;
        z-index: 999;
    }
    .card { width: 42px !important; height: 64px !important; font-size: 13px !important; }
}

/* 💻 សម្រាប់ Tablet និង កុំព្យូទ័រ (អេក្រង់ធំស្រាប់) */
@media screen and (min-width: 769px) {
    .card { width: 65px; height: 98px; font-size: 18px; }
    #currentPlayZone { min-height: 18px; }
}

/* 💫 CSS ចលនាបៀរហោះ */
.flying-card {
    position: fixed;
    width: 45px;
    height: 68px;
    background: white;
    color: black;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    z-index: 9999;
    transition: all 0.55s cubic-bezier(0.25, 1, 0.5, 1);
    pointer-events: none;
}
.flying-card.red { color: #ef4444; }

/* 🏆 លទ្ធផលឈ្នះចាញ់ */
.result-player {
    background: #334155;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
}
.result-cards { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.result-card {
    width: 40px; height: 60px; background: white; color: black;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
}
.result-card.red { color: #ef4444; }
</style>
</head>
<body>

<div class="container">
    <div id="lobbyScreen" class="panel">
        <h1>🃏 ទៀនឡេន អនឡាញ</h1>
        <input type="text" id="playerNameInput" placeholder="វាយឈ្មោះរបស់អ្នកនៅទីនេះ...">
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <input type="text" id="createRoomIdInput" placeholder="លេខបន្ទប់បង្កើត">
            <button onclick="createRoom()">បង្កើតបន្ទប់</button>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <input type="text" id="joinRoomIdInput" placeholder="លេខបន្ទប់ចូលលេង">
            <button onclick="joinRoom()" style="background: #10b981;">ចូលលេង</button>
        </div>
    </div>

    <div id="waitingScreen" class="panel" style="display:none;">
        <h2 id="roomTitle">បន្ទប់លេខ៖ </h2>
        <h3 style="margin-top: 15px;">សមាជិកក្នុងបន្ទប់៖</h3>
        <div id="waitingPlayersList" style="margin: 10px 0;"></div>
        <button id="startBtn" onclick="startGame()" style="background: #10b981; display:none;">ចាប់ផ្ដើមហ្គេម</button>
        <button onclick="leaveRoom()" style="background: #ef4444; margin-left: 10px;">ចាកចេញ</button>
    </div>

    <div id="playScreen" style="display:none; width: 100%; height: 100%;">
        <div class="game-layout">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 2px 5px;">
                <span id="gameRoomTitle" style="font-size: 12px;">បន្ទប់៖ </span>
                <div id="activePlayersStatus" class="player-list"></div>
                <button onclick="leaveRoom()" style="background: #ef4444; padding: 4px 10px; font-size: 11px; border-radius: 5px;">ឈប់លេង</button>
            </div>

            <div id="currentPlayZone">
                <div id="lastPlayedCards" class="card-display"></div>
            </div>

            <div>
                <div class="controls">
                    <button id="passBtn" onclick="passTurn()" style="background: #ef4444;">Pass (អត់ស៊ី)</button>
                    <button id="playBtn" onclick="playSelectedCards()" style="background: #22c55e;">ចុះបៀរ</button>
                </div>
                <div id="playerHand" class="hand"></div>
            </div>
        </div>
    </div>

    <div id="resultScreen" class="panel" style="display:none; text-align: center;">
        <h2 id="winnerName" style="color: #f59e0b; margin-bottom: 15px;">🏆 អ្នកឈ្នះ 🏆</h2>
        <div id="playersResult" style="text-align: left; margin-bottom: 20px;"></div>
        <button id="hostPlayAgainBtn" onclick="startGame()" style="background: #10b981; display:none;">លេងម្ដងទៀត</button>
        <p id="waitHostText" style="color: #94a3b8; display:none;">រង់ចាំមេបន្ទប់ចាប់ផ្ដើមជុំបន្ទាប់...</p>
        <button onclick="leaveRoom()" style="background: #ef4444; margin-top: 10px;">ត្រឡប់ទៅទំព័រមុខ</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentRoomId = null;
let myPlayerId = null;
let isCreator = false;
let selectedCards = [];

function createRoom() {
    const name = document.getElementById('playerNameInput').value.trim();
    const roomId = document.getElementById('createRoomIdInput').value.trim();
    if(!name || !roomId) return alert('សូមបំពេញឈ្មោះ និងលេខបន្ទប់!');
    isCreator = true;
    socket.emit('createRoom', { roomId, playerName: name });
}

function joinRoom() {
    const name = document.getElementById('playerNameInput').value.trim();
    const roomId = document.getElementById('joinRoomIdInput').value.trim();
    if(!name || !roomId) return alert('សូមបំពេញឈ្មោះ និងលេខបន្ទប់!');
    isCreator = false;
    socket.emit('joinRoom', { roomId, playerName: name });
}

function startGame() {
    socket.emit('startGame', currentRoomId);
}

function leaveRoom() {
    socket.emit('leaveRoom');
    window.location.reload();
}

function passTurn() {
    socket.emit('passTurn', currentRoomId);
}

function playSelectedCards() {
    if(selectedCards.length === 0) return alert('សូមជ្រើសរើសបៀរមុននឹងចុះ!');
    socket.emit('playCard', { roomId: currentRoomId, cards: selectedCards });
}

function toggleSelectCard(card, el) {
    const idx = selectedCards.findIndex(c => c.value === card.value && c.suit === card.suit);
    if (idx !== -1) {
        selectedCards.splice(idx, 1);
        el.classList.remove('selected');
    } else {
        selectedCards.push(card);
        el.classList.add('selected');
    }
}

// 💫 មុខងារធ្វើឱ្យបៀរហោះចេញពីឈ្មោះអ្នកចុះមកកណ្ដាលតុ
function animateFlyingCards(cards, fromPlayerName) {
    let sourceEl = document.getElementById(`player-tag-${fromPlayerName}`) || document.getElementById('playerHand');
    let targetEl = document.getElementById('currentPlayZone'); 
    if (!sourceEl || !targetEl || cards.length === 0) return;

    const sourceRect = sourceEl.getBoundingClientRect();
    const targetRect = targetEl.getBoundingClientRect();

    const targetX = targetRect.left + (targetRect.width / 2) - 22;
    const targetY = targetRect.top + (targetRect.height / 2) - 34;

    cards.forEach((card, index) => {
        setTimeout(() => {
            const cardEl = document.createElement('div');
            const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
            cardEl.className = `flying-card ${isRed}`;
            cardEl.innerHTML = `${card.value}${card.suit}`;

            cardEl.style.left = `${sourceRect.left + (index * 10)}px`;
            cardEl.style.top = `${sourceRect.top}px`;
            cardEl.style.transform = 'scale(0.6)';

            document.body.appendChild(cardEl);

            requestAnimationFrame(() => {
                cardEl.style.left = `${targetX + (index * 15) - (cards.length * 7)}px`;
                cardEl.style.top = `${targetY}px`;
                cardEl.style.transform = `scale(1) rotate(${Math.floor(Math.random() * 16) - 8}deg)`; 
            });

            setTimeout(() => { cardEl.remove(); }, 550); 
        }, index * 80); 
    });
}

// ==========================================
// 📡 ស្ដាប់រាល់ EVENTS ចេញពី SERVER
// ==========================================

socket.on('roomCreated', ({ roomId, playerId }) => {
    currentRoomId = roomId; myPlayerId = playerId;
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('waitingScreen').style.display = 'block';
    document.getElementById('roomTitle').innerText = `បន្ទប់លេខ៖ ${roomId}`;
    if(isCreator) document.getElementById('startBtn').style.display = 'inline-block';
});

socket.on('roomJoined', ({ roomId, playerId, isSpectator }) => {
    currentRoomId = roomId; myPlayerId = playerId;
    document.getElementById('lobbyScreen').style.display = 'none';
    if (isSpectator) {
        document.getElementById('playScreen').style.display = 'block';
    } else {
        document.getElementById('waitingScreen').style.display = 'block';
        document.getElementById('roomTitle').innerText = `បន្ទប់លេខ៖ ${roomId}`;
    }
});

socket.on('updatePlayers', (players) => {
    const listDiv = document.getElementById('waitingPlayersList');
    listDiv.innerHTML = '';
    players.forEach(p => {
        listDiv.innerHTML += `<div>👤 <strong>${p.name}</strong> ${p.id === myPlayerId ? '(អ្នក)' : ''}</div>`;
    });
});

socket.on('dealCards', ({ hand }) => {
    selectedCards = [];
    const handDiv = document.getElementById('playerHand');
    handDiv.innerHTML = '';
    hand.forEach(card => {
        const cardEl = document.createElement('div');
        const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
        cardEl.className = `card ${isRed}`;
        cardEl.innerHTML = `${card.value}${card.suit}`;
        cardEl.onclick = () => toggleSelectCard(card, cardEl);
        handDiv.appendChild(cardEl);
    });
});

socket.on('gameStarted', ({ players, currentTurnIndex }) => {
    document.getElementById('waitingScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('playScreen').style.display = 'block';
    document.getElementById('gameRoomTitle').innerText = `បន្ទប់៖ ${currentRoomId}`;
    document.getElementById('lastPlayedCards').innerHTML = '';
});

socket.on('cardPlayed', ({ by, cards, nextTurn, cardCount, updatedHands }) => {
    selectedCards = [];
    
    // លេង Animation បៀរហោះ
    if (by !== 'System') animateFlyingCards(cards, by);

    // បង្ហាញស្ថានភាពវេនលេង
    const statusDiv = document.getElementById('activePlayersStatus');
    statusDiv.innerHTML = '';
    updatedHands.forEach((p, idx) => {
        const isHisTurn = idx === nextTurn;
        statusDiv.innerHTML += `<div id="player-tag-${p.name}" class="player-badge ${isHisTurn ? 'active-turn' : ''}">
            👤 ${p.name} (${p.isSpectator ? 'មើល' : p.hand.length + ' សន្លឹក'})
        </div>`;
    });

    // បង្ហាញបៀរលើតុ (ពន្យារពេលឱ្យត្រូវនឹងបៀរហោះមកដល់)
    setTimeout(() => {
        const tableDiv = document.getElementById('lastPlayedCards');
        tableDiv.innerHTML = '';
        cards.forEach(card => {
            const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
            tableDiv.innerHTML += `<div class="card ${isRed}">${card.value}${card.suit}</div>`;
        });
    }, by === 'System' ? 0 : 400);
});

socket.on('playerPassed', ({ name, id }) => {
    const badge = document.getElementById(`player-tag-${name}`);
    if(badge) {
        badge.style.opacity = '0.4';
        badge.innerText += ' (Pass)';
    }
});

socket.on('clearTable', ({ nextPlayer }) => {
    document.getElementById('lastPlayedCards').innerHTML = `<div style="color:rgba(255,255,255,0.4); font-size:12px;">ដាច់ទឹក! វេនថ្មីរបស់ ${nextPlayer}</div>`;
});

socket.on('gameWon', ({ winner, winnerId, allHands }) => {
    document.getElementById('playScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('winnerName').innerText = `🏆 អ្នកឈ្នះគឺ៖ ${winner} 🏆`;

    const resultDiv = document.getElementById('playersResult');
    resultDiv.innerHTML = '';

    allHands.forEach(p => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'result-player';
        
        if (p.isWinner) {
            playerDiv.style.border = '2px solid #eab308';
            playerDiv.style.background = '#3f3f46';
        }

        let cardsHTML = '';
        if (p.isSpectator) {
            cardsHTML = `<span style="color: #ef4444; font-weight: bold;">(អ្នកមើលការប្រកួត)</span>`;
        } else if (p.isWinner) {
            cardsHTML = `<span style="color: #eab308; font-weight: bold; margin-right: 10px;">[បៀឈ្នះចុងក្រោយ]៖</span>`;
            p.remaining.forEach(card => {
                const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
                cardsHTML += `<div class="result-card ${isRed}">${card.value}${card.suit}</div>`;
            });
        } else if (!p.remaining || p.remaining.length === 0) {
            cardsHTML = `<span style="color: #22c55e; font-weight: bold;">អស់បៀពីដៃ</span>`;
        } else {
            p.remaining.forEach(card => {
                const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
                cardsHTML += `<div class="result-card ${isRed}">${card.value}${card.suit}</div>`;
            });
        }

        playerDiv.innerHTML = `
            <strong>👤 ${p.name}</strong> 
            ${p.isSpectator ? '' : (p.isWinner ? `<span style="color: #eab308; font-weight: bold;"> (👑 អ្នកឈ្នះ)</span>` : `(នៅសល់ ${p.remaining ? p.remaining.length : 0} សន្លឹក)`)}
            <div class="result-cards">${cardsHTML}</div>
        `;
        resultDiv.appendChild(playerDiv);
    });

    if (isCreator) {
        document.getElementById('hostPlayAgainBtn').style.display = 'block';
        document.getElementById('waitHostText').style.display = 'none';
    } else {
        document.getElementById('hostPlayAgainBtn').style.display = 'none';
        document.getElementById('waitHostText').style.display = 'block';
    }
});

socket.on('errorMsg', (msg) => { alert(msg); });
</script>
</body>
</html>
