<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🃏 Games Online</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #334155;
    color: white;
}

button {
    padding: 12px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s ease, transform 0.1s ease;
}
button:active {
    transform: scale(0.98);
}

button:disabled {
    background: #475569 !important;
    color: #94a3b8 !important;
    cursor: not-allowed;
    transform: none !important;
    opacity: 0.6;
}

.btn-blue { background: #3b82f6; color: white; }
.btn-blue:hover:not(:disabled) { background: #2563eb; }
.btn-green { background: #22c55e; color: white; }
.btn-green:hover:not(:disabled) { background: #16a34a; }
.btn-red { background: #ef4444; color: white; }
.btn-red:hover:not(:disabled) { background: #dc2626; }
.btn-orange { background: #f59e0b; color: white; }
.btn-orange:hover:not(:disabled) { background: #d97706; }

.room-item {
    background: #334155;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#gameArea {
    display: none;
    position: relative;
    width: 100%;
    height: 100%;
}

@media screen and (max-width: 932px) and (orientation: portrait) {
    body.in-game {
        overflow: hidden;
        position: fixed;
        width: 100vw;
        height: 100vh;
    }

    body.in-game .container {
        padding: 0;
        max-width: 100%;
    }

    body.in-game #gameArea {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
        background: #0f172a;
        padding: 10px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
}

@media screen and (min-width: 600px) and (orientation: landscape), screen and (min-width: 933px) {
    body.in-game #gameArea {
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        height: 92vh;
        max-height: 700px;
        gap: 10px;
    }
}

.game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    padding: 8px 15px;
    border-radius: 10px;
}

#players {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    width: 100%;
    flex-wrap: wrap;
}

.player {
    background: #334155;
    padding: 6px 10px;
    border-radius: 10px;
    min-width: 90px;
    flex: 1;
    max-width: 150px;
    position: relative;
    border: 2px solid transparent; 
    transition: all 0.3s ease;
    text-align: center;
    font-size: 13px;
}

.player.active-turn {
    border: 2px solid #22c55e !important;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.6) !important;
    background: #1e293b !important;
}

.player-passed {
    background: #451a1a !important;
    border: 2px solid #ef4444 !important;
    opacity: 0.6;
}

.turn-badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    color: white;
    font-size: 9px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 20px;
    white-space: nowrap;
}

.card-counter {
    margin-top: 4px;
    background: #1e293b;
    border-radius: 5px;
    padding: 2px 5px;
    font-weight: bold;
    font-size: 11px;
    color: #f59e0b;
    border: 1px solid #475569;
    display: inline-block;
}

.table-area {
    background: #14532d; 
    border: 2px dashed #22c55e;
    border-radius: 12px;
    flex: 1;
    min-height: 110px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: nowrap;
    overflow-x: auto;  
    gap: 6px;
    padding: 10px;
    position: relative;
}

.hand-and-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #1e293b;
    padding: 10px;
    border-radius: 12px;
}

.card-container {
    display: flex;
    justify-content: center;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding: 10px 0;
    gap: -15px; 
}

.card {
    background: white;
    color: black;
    width: 52px;
    height: 76px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 4px 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    box-shadow: -2px 3px 5px rgba(0,0,0,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
    margin-right: -12px; 
}

.card:last-child {
    margin-right: 0;
}

.card.red {
    color: #ef4444;
}

.card.back-card {
    background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%) !important;
    border: 2px solid #f59e0b !important;
    color: transparent !important;
}

.card.first-turn-highlight {
    box-shadow: 0 0 12px #eab308 !important;
    border: 2px solid #eab308 !important;
    animation: pulseGlow 1.5s infinite alternate;
}

@keyframes pulseGlow {
    0% { box-shadow: 0 0 6px #eab308; border-color: #eab308; }
    100% { box-shadow: 0 0 18px #eab308; border-color: #f59e0b; }
}

.card.selected {
    transform: translateY(-15px);
    box-shadow: 0 5px 10px #3b82f6;
    border: 2px solid #3b82f6;
    margin-right: -6px;
}

.card.disabled-card {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none !important;
    border: none !important;
}

.table-card {
    background: white;
    color: black;
    width: 52px;
    height: 76px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 4px 6px;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
    flex-shrink: 0;
    user-select: none;
}
.table-card.red {
    color: #ef4444;
}
.table-card.folded {
    background: linear-gradient(135deg, #451a03 0%, #78350f 100%) !important;
    color: #f59e0b !important;
    border: 2px dashed #f59e0b;
    justify-content: center !important;
    align-items: center !important;
}

.controls {
    display: flex;
    gap: 10px;
}
.controls button {
    margin-top: 0;
    padding: 10px;
    font-size: 15px;
}

.bubble-msg {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    background: #ef4444;
    color: white;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: bold;
    animation: fadeUp 1.5s forwards;
    white-space: nowrap;
    z-index: 10;
}

@keyframes fadeUp {
    0% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -15px); }
}

#resultArea {
    display: none;
    text-align: center;
}

.result-player {
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    text-align: left;
}

.result-cards {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.animate-play-card {
    animation: popInCard 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popInCard {
    0% {
        opacity: 0;
        transform: scale(0.3) translateY(60px) rotate(-12deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0) rotate(0deg);
    }
}
</style>
</head>
<body>

<div class="container">
    <div id="loginArea" class="panel">
        <h1>🃏 Games Online</h1>
        <input type="text" id="playerName" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក...">
        <div style="margin-top: 15px;">
            <label style="font-size: 14px; color:#94a3b8;">ជ្រើសរើសហ្គេម៖</label>
            <select id="gameTypeSelect">
                <option value="tienlen">Tien Len (ទៀនឡេន)</option>
                <option value="catte">Catte (កាតេ)</option>
            </select>
            <input type="text" id="roomInput" placeholder="លេខបន្ទប់ (Room ID)...">
            <input type="password" id="roomPass" placeholder="លេខកូដសម្ងាត់បន្ទប់ (បើគ្មាន ទុកទទេ)...">
            <div style="display: flex; gap: 10px;">
                <button class="btn-blue" onclick="createRoom()">➕ បង្កើតបន្ទប់ថ្មី</button>
                <button class="btn-green" onclick="joinRoom()">🚪 ចូលរួមបន្ទប់</button>
            </div>
        </div>
        <hr style="margin-top: 20px; border-color: #334155;">
        <h3 style="margin-top: 15px;">🏰 បញ្ជីបន្ទប់កំពុងរង់ចាំ៖</h3>
        <div id="roomList"></div>
    </div>

    <div id="lobbyArea" class="panel" style="display: none;">
        <h1>🃏 Games Online</h1>
        <h2>Room: <span id="showRoom" style="color: #3b82f6;"></span> (<span id="showGameType" style="color: #f59e0b;"></span>)</h2>
        <br>
        <div id="lobbyGameSelector" style="display: none; margin-bottom: 15px;">
            <label style="font-size: 14px;">ប្តូរប្រភេទហ្គេម៖ </label>
            <select id="lobbyGameType" onchange="onLobbyGameTypeChange()" style="width: auto; display: inline-block; padding: 5px; margin: 0; font-size:14px;">
                <option value="tienlen">Tien Len</option>
                <option value="catte">Catte</option>
            </select>
        </div>
        <div id="lobbyPlayers" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;"></div>
        <button id="startBtn" class="btn-green" onclick="startGame()" style="display: none;">🚀 Start Game</button>
        <button class="btn-red" onclick="leaveRoom()">🚪 ចាកចេញ (Leave)</button>
    </div>

    <div id="gameArea">
        <div class="game-header">
            <div id="status" style="font-weight: bold; color: #22c55e;">Waiting...</div>
            <button class="btn-red" onclick="leaveRoom()" style="margin-top: 0; padding: 6px 12px; font-size: 13px; width: auto;">🚪 ផ្ទះដើម</button>
        </div>

        <div id="players"></div>

        <div class="table-area" id="table">
            <div style="color: #a7f3d0;">មិនទាន់មានបៀរចុះឡើយ</div>
        </div>

        <div class="hand-and-controls">
            <div class="card-container" id="myCards"></div>
            <div class="controls" id="actionControls">
                <button id="playBtn" class="btn-green" onclick="playSelectedCards()">🎯 ចុះបៀរ (Play)</button>
                <button id="foldBtn" class="btn-orange" onclick="foldCard()" style="display: none;">🔒 ធិបបៀរ (Fold)</button>
                <button id="passBtn" class="btn-red" onclick="passTurn()">❌ រំលង (Pass)</button>
            </div>
        </div>
    </div>

    <div id="resultArea" class="panel">
        <h2 style="color: #22c55e;">🎉 ជ័យជម្នះបានទៅលើ៖ <span id="winnerName"></span></h2>
        <br>
        <h3>📊 ចំណាត់ថ្នាក់៖</h3>
        <div id="resultList"></div>
        <br>
        <button id="hostPlayAgainBtn" class="btn-green" onclick="startGame()" style="display: none;">🔄 លេងម្ដងទៀត (Play Again)</button>
        <div id="waitHostText" style="color: #94a3b8; margin-top: 15px;">សូមរង់ចាំ Host ចាប់ផ្ដើមវគ្គថ្មី...</div>
        <button class="btn-red" onclick="leaveRoom()">🚪 ចាកចេញទៅទំព័រដើម</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myId = null;
let currentRoom = null;
let isCreator = false;
let myHand = [];
let selectedCards = [];
let currentTurnIndex = 0;
let playersData = [];
let amISpectator = false;
let lastRoundWinnerId = null; 
let currentGameType = 'tienlen';

if (localStorage.getItem('tienlen_name')) {
    document.getElementById('playerName').value = localStorage.getItem('tienlen_name');
}

socket.on('roomList', (rooms) => {
    const div = document.getElementById('roomList');
    div.innerHTML = '';
    if (rooms.length === 0) {
        div.innerHTML = '<div style="color: #64748b; margin-top: 10px;">មិនទាន់មានបន្ទប់នៅឡើយទេ...</div>';
        return;
    }
    rooms.forEach(r => {
        const item = document.createElement('div');
        item.className = 'room-item';
        const lockIcon = r.hasPassword ? '🔒' : '🔓';
        const statusText = r.status === 'playing' ? '<span style="color: #ef4444;">(កំពុងលេង)</span>' : '<span style="color: #22c55e;">(ទំនេរ)</span>';
        const typeText = r.gameType === 'catte' ? 'Catte' : 'Tien Len';
        
        item.innerHTML = `
            <div>
                <strong>បន្ទប់ ID: ${r.roomId} [${typeText}]</strong> ${lockIcon} <br>
                <small style="color: #94a3b8;">សមាជិក៖ ${r.playerCount}/${r.gameType==='catte'?6:4} នាក់ ${statusText}</small>
            </div>
            <button class="btn-blue" style="width: auto; margin-top: 0; padding: 6px 12px;" onclick="quickJoin('${r.roomId}', ${r.hasPassword})">ចូលរួម</button>
        `;
        div.appendChild(item);
    });
});

function quickJoin(roomId, hasPassword) {
    document.getElementById('roomInput').value = roomId;
    if (hasPassword) {
        const pass = prompt("សូមបញ្ចូលលេខកូដសម្ងាត់បន្ទប់៖");
        if (pass !== null) document.getElementById('roomPass').value = pass;
    }
    joinRoom();
}

function getPlayerName() {
    const name = document.getElementById('playerName').value.trim();
    if (!name) {
        alert("សូមបញ្ចូលឈ្មោះរបស់អ្នកជាមុនសិន!");
        return null;
    }
    localStorage.setItem('tienlen_name', name);
    return name;
}

function createRoom() {
    const playerName = getPlayerName();
    if (!playerName) return;
    const roomId = document.getElementById('roomInput').value.trim();
    const password = document.getElementById('roomPass').value;
    const gameType = document.getElementById('gameTypeSelect').value;
    if (!roomId) return alert("សូមបញ្ចូលលេខបន្ទប់!");

    socket.emit('createRoom', { roomId, password, playerName, gameType });
}

function joinRoom() {
    const playerName = getPlayerName();
    if (!playerName) return;
    const roomId = document.getElementById('roomInput').value.trim();
    const password = document.getElementById('roomPass').value;
    if (!roomId) return alert("សូមបញ្ចូលលេខបន្ទប់!");

    socket.emit('joinRoom', { roomId, password, playerName });
}

socket.on('roomCreated', ({ roomId, playerId }) => {
    myId = playerId;
    currentRoom = roomId;
    isCreator = true;
    showLobby(roomId);
});

socket.on('roomJoined', ({ roomId, playerId, isSpectator }) => {
    myId = playerId;
    currentRoom = roomId;
    isCreator = false;
    amISpectator = isSpectator;
    showLobby(roomId);
});

function showLobby(roomId) {
    document.body.classList.remove('in-game');
    document.getElementById('loginArea').style.none = 'none';
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('showRoom').innerText = roomId;
    
    if (isCreator) {
        document.getElementById('lobbyGameSelector').style.display = 'block';
    } else {
        document.getElementById('lobbyGameSelector').style.display = 'none';
    }
}

function onLobbyGameTypeChange() {
    const gt = document.getElementById('lobbyGameType').value;
    socket.emit('changeGameType', { roomId: currentRoom, gameType: gt });
}

socket.on('gameTypeChanged', (gameType) => {
    currentGameType = gameType;
    document.getElementById('showGameType').innerText = gameType === 'catte' ? 'កាតេ' : 'ទៀនឡេន';
    document.getElementById('lobbyGameType').value = gameType;
});

socket.on('updatePlayers', (players) => {
    playersData = players;
    const me = players.find(p => p.id === myId);
    if (me) {
        isCreator = (players[0].id === myId);
        amISpectator = me.isSpectator;
    }
    renderPlayers(players);
});

function startGame() {
    socket.emit('startGame', currentRoom);
}

socket.on('gameStarted', ({ players, currentTurnIndex: turn, lastRoundWinnerId: serverWinnerId, gameType }) => {
    currentTurnIndex = turn;
    playersData = players;
    lastRoundWinnerId = serverWinnerId; 
    currentGameType = gameType;
    
    const myData = players.find(p => p.id === myId);
    amISpectator = myData ? myData.isSpectator : false;

    document.body.classList.add('in-game');
    document.getElementById('lobbyArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    
    document.getElementById('table').innerHTML = '<div style="color: #a7f3d0;">ចាប់ផ្ដើមហ្គេម!</div>';
    
    // បង្ហាញ ឬលាក់ Button ទៅតាមប្រភេទហ្គេម
    if (currentGameType === 'catte') {
        document.getElementById('foldBtn').style.display = 'inline-block';
        document.getElementById('passBtn').style.display = 'none';
    } else {
        document.getElementById('foldBtn').style.display = 'none';
        document.getElementById('passBtn').style.display = 'inline-block';
    }

    renderPlayers(players);
    updateControlsState();
    
    if (playersData[currentTurnIndex]) {
        document.getElementById('status').innerHTML = `🎯 វេន៖ ${playersData[currentTurnIndex].name}`;
    }

    if (amISpectator) {
        document.getElementById('actionControls').style.display = 'none';
    } else {
        document.getElementById('actionControls').style.display = 'flex';
    }
});

socket.on('dealCards', ({ hand }) => {
    myHand = hand;
    selectedCards = [];
    renderMyCards();
    updateControlsState();
});

function isMyTurn() {
    if (amISpectator || currentTurnIndex === null || currentTurnIndex === undefined) return false;
    const activePlayer = playersData[currentTurnIndex];
    return activePlayer && activePlayer.id === myId;
}

function updateControlsState() {
    const playBtn = document.getElementById('playBtn');
    const passBtn = document.getElementById('passBtn');
    const foldBtn = document.getElementById('foldBtn');
    
    const myTurn = isMyTurn();
    if (playBtn) playBtn.disabled = !myTurn;
    if (passBtn) passBtn.disabled = !myTurn;
    if (foldBtn) foldBtn.disabled = !myTurn;
}

function renderPlayers(players) {
    playersData = players;
    const div = document.getElementById('players');
    const lobby = document.getElementById('lobbyPlayers');

    div.innerHTML = '';
    lobby.innerHTML = '';

    players.forEach((p, index) => {
        const el = document.createElement('div');
        el.className = 'player';
        el.id = `player-card-${p.id}`; 
        
        const isCurrentTurn = (index === currentTurnIndex && !p.isSpectator && p.hand.length > 0);
        
        if (isCurrentTurn) el.classList.add('active-turn'); 
        if (p.passed && p.hand.length > 0 && currentGameType !== 'catte') el.classList.add('player-passed'); 

        let roleText = '';
        if (p.isSpectator) {
            roleText = '<span style="color: #ef4444;">(អ្នកមើល)</span>';
        } else if (p.rank !== null && p.rank > 0) {
            let rankBadge = p.rank === 1 ? '🎉 លេខ ១' : `🥈 ទី ${p.rank}`;
            roleText = `<div style="color: #22c55e; font-weight: bold; margin-top:2px;">${rankBadge}</div>`;
        } else {
            const count = p.hand ? p.hand.length : (p.cardCount !== undefined ? p.cardCount : (currentGameType==='catte'?6:13));
            roleText = `<div class="card-counter">🃏 សល់៖ ${count}</div>`;
        }

        if (p.passed && !p.isSpectator && p.hand.length > 0 && currentGameType !== 'catte') {
            roleText += '<br><span style="color: #ef4444; font-weight: bold; font-size: 11px;">❌ Pass</span>';
        }

        let turnBadgeHTML = isCurrentTurn ? `<div class="turn-badge">${p.id === myId ? '🟢 វេនអ្នក' : '🎯 កំពុងលេង'}</div>` : '';

        el.innerHTML = `
            ${turnBadgeHTML}
            <strong>👤 ${p.name.substring(0, 8)} ${p.id === myId ? '(ខ្ញុំ)' : ''}</strong>
            <br>
            ${roleText}
        `;
        div.appendChild(el);

        const el2 = document.createElement('div');
        el2.className = 'player';
        el2.style.marginBottom = '10px';
        el2.innerHTML = `👤 ${p.name} ${p.id === myId ? '(ខ្ញុំ)' : ''} ${p.isSpectator ? '<span style="color: #ef4444;">(អ្នកមើល)</span>' : ''}`;
        lobby.appendChild(el2);
    });

    const startBtn = document.getElementById('startBtn');
    if (isCreator) {
        startBtn.style.display = 'inline-block';
    } else {
        startBtn.style.display = 'none';
    }
}

function renderMyCards() {
    const div = document.getElementById('myCards');
    div.innerHTML = '';
    if (amISpectator) {
        div.innerHTML = '<div style="color: #94a3b8; font-style: italic; font-size:13px;">អ្នកកំពុងចូលរួមមើលការប្រកួត...</div>';
        return;
    }
    
    const myTurn = isMyTurn();
    const tableDiv = document.getElementById('table');
    const isNewRound = tableDiv && (tableDiv.innerHTML.includes('ចាប់ផ្ដើមហ្គេម!') || tableDiv.innerHTML.includes('មិនទាន់មានបៀរចុះឡើយ') || tableDiv.innerHTML.includes('តុត្រូវបានសម្អាត!'));

    myHand.forEach(card => {
        const el = document.createElement('div');
        const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
        el.className = `card ${isRed}`;
        
        if (!myTurn) {
            el.classList.add('disabled-card');
        } else {
            if (isNewRound && currentGameType === 'tienlen') {
                if (!lastRoundWinnerId) {
                    if (card.value === '3' && card.suit === '♠') el.classList.add('first-turn-highlight');
                } else {
                    if (myId === lastRoundWinnerId) el.classList.add('first-turn-highlight');
                }
            }
        }
        
        const isSelected = selectedCards.some(c => c.value === card.value && c.suit === card.suit);
        if (isSelected && myTurn) el.classList.add('selected');

        el.innerHTML = `
            <div>${card.value}</div>
            <div style="align-self: center; font-size: 20px;">${card.suit}</div>
            <div style="align-self: flex-end; transform: rotate(180deg);">${card.value}</div>
        `;
        
        el.onclick = () => {
            if (!isMyTurn()) return; 
            if (currentGameType === 'catte') {
                // សម្រាប់កាតេអនុញ្ញាតឲ្យជ្រើសរើសបានតែ ១ សន្លឹកប៉ុណ្ណោះ
                selectedCards = [card];
                renderMyCards();
            } else {
                toggleCard(card);
            }
        };
        div.appendChild(el);
    });
}

function toggleCard(card) {
    const idx = selectedCards.findIndex(c => c.value === card.value && c.suit === card.suit);
    if (idx === -1) {
        selectedCards.push(card);
    } else {
        selectedCards.splice(idx, 1);
    }
    renderMyCards();
}

function playSelectedCards() {
    if (!isMyTurn()) return alert("មិនទាន់ដល់វេនរបស់អ្នកឡើយ!");
    if (selectedCards.length === 0) return alert("សូមជ្រើសរើសសន្លឹកបៀរមុននឹងចុះ!");
    socket.emit('playCard', { roomId: currentRoom, cards: selectedCards, isFolded: false });
}

function foldCard() {
    if (!isMyTurn()) return alert("មិនទាន់ដល់វេនរបស់អ្នកឡើយ!");
    if (selectedCards.length === 0) return alert("សូមជ្រើសរើសសន្លឹកបៀរ ១ សន្លឹកដើម្បីធិប!");
    socket.emit('playCard', { roomId: currentRoom, cards: selectedCards, isFolded: true });
}

function passTurn() {
    if (!isMyTurn()) return alert("មិនទាន់ដល់វេនរបស់អ្នកឡើយ!");
    socket.emit('passTurn', currentRoom);
}

socket.on('turnChanged', ({ currentTurnIndex: turn }) => {
    currentTurnIndex = turn;
    if (playersData[currentTurnIndex]) {
        document.getElementById('status').innerHTML = `🎯 វេន៖ ${playersData[currentTurnIndex].name}`;
    }
    renderPlayers(playersData);
    updateControlsState();
    renderMyCards(); 
});

socket.on('cardPlayed', ({ by, cards, nextTurn, cardCount, updatedHands, isFolded, shoutOut }) => {
    currentTurnIndex = nextTurn;
    
    updatedHands.forEach(p => {
        const found = playersData.find(oldP => oldP.id === p.id);
        if (found) {
            found.cardCount = p.hand ? p.hand.length : p.cardCount;
            found.rank = p.rank; 
            found.passed = p.passed; 
        }
    });

    playersData = updatedHands;
    
    const me = updatedHands.find(p => p.id === myId);
    if (me && me.hand) myHand = me.hand;

    renderPlayers(updatedHands);
    updateControlsState();
    renderMyCards();

    if (playersData[currentTurnIndex]) {
        document.getElementById('status').innerHTML = `🎯 វេន៖ ${playersData[currentTurnIndex].name}`;
    }

    const tableDiv = document.getElementById('table');
    tableDiv.innerHTML = '';
    
    if (cards && cards.length > 0) {
        cards.forEach((card, index) => {
            const el = document.createElement('div');
            if (isFolded) {
                el.className = `table-card folded animate-play-card`;
                el.innerHTML = `🎴<br><span style="font-size:10px;">ធិបបៀរ</span>`;
            } else {
                const isRed = card.suit === '♥' || card.suit === '♦' ? 'red' : '';
                el.className = `table-card ${isRed} animate-play-card`;
                el.style.animationDelay = `${index * 0.05}s`;
                el.innerHTML = `
                    <div>${card.value}</div>
                    <div style="align-self: center; font-size: 20px;">${card.suit}</div>
                    <div style="align-self: flex-end; transform: rotate(180deg);">${card.value}</div>
                `;
            }
            tableDiv.appendChild(el);
        });
    } else {
        tableDiv.innerHTML = '<div style="color: #a7f3d0;">មិនទាន់មានបៀរចុះឡើយ</div>';
    }

    // ពិនិត្យលោតអក្សរ «នេះនែ គប់ទេ» ពេលសល់ ២ សន្លឹកហើយវាយចេញ
    if (shoutOut) {
        const activePlayer = updatedHands.find(p => p.name === by);
        if (activePlayer) {
            const playerCard = document.getElementById(`player-card-${activePlayer.id}`);
            if (playerCard) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble-msg';
                bubble.style.background = '#eab308';
                bubble.style.color = 'black';
                bubble.innerText = "💥 នេះនែ គប់ទេ!";
                playerCard.appendChild(bubble);
                setTimeout(() => bubble.remove(), 2000);
            }
        }
    }
    
    selectedCards = [];
    renderMyCards();
});

socket.on('playerPassed', ({ name, id }) => {
    const playerCard = document.getElementById(`player-card-${id}`);
    if (playerCard) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble-msg';
        bubble.innerText = "Pass ❌";
        playerCard.appendChild(bubble);
        setTimeout(() => bubble.remove(), 1500);
    }
});

socket.on('clearTable', ({ nextPlayer }) => {
    document.getElementById('table').innerHTML = '<div style="color: #64748b;">តុត្រូវបានសម្អាត! ជុំថ្មី...</div>';
    renderMyCards();
});

socket.on('errorMsg', (msg) => {
    alert("⚠️ " + msg);
    selectedCards = [];
    renderMyCards();
});

socket.on('gameWon', ({ winner, winnerId, allHands }) => {
    lastRoundWinnerId = winnerId;

    document.body.classList.remove('in-game');
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    
    document.getElementById('winnerName').innerText = winner;

    const resultList = document.getElementById('resultList');
    resultList.innerHTML = '';

    allHands.forEach((p, index) => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'result-player';
        
        if (p.rank === 1) {
            playerDiv.style.border = '2px solid #eab308';
            playerDiv.style.background = '#1e293b';
        }

        let rankBadgeHTML = p.rank === 1 
            ? `<span style="color: #eab308; font-weight: bold;">👑 អ្នកឈ្នះ (🏆 Winner)</span>` 
            : `<span style="color: #ef4444;">❌ អ្នកចាញ់</span>`;

        playerDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>👤 ${p.name} ${p.id === myId ? '<span style="color:#22c55e;">(ខ្ញុំ)</span>' : ''}</strong>
                <div>${rankBadgeHTML}</div>
            </div>
        `;
        resultList.appendChild(playerDiv);
    });

    const playAgainBtn = document.getElementById('hostPlayAgainBtn');
    const waitText = document.getElementById('waitHostText');
    if (isCreator) {
        playAgainBtn.style.display = 'block';
        waitText.style.display = 'none';
    } else {
        playAgainBtn.style.display = 'none';
        waitText.style.display = 'block';
    }
});

function leaveRoom() {
    if (confirm("តើអ្នកពិតជាចង់ចាកចេញពីបន្ទប់នេះមែនទេ?")) {
        socket.emit('leaveRoom');
    }
}

socket.on('leftRoom', () => {
    document.body.classList.remove('in-game');
    currentRoom = null;
    myHand = [];
    selectedCards = [];
    playersData = [];
    amISpectator = false;
    lastRoundWinnerId = null; 
    
    document.getElementById('loginArea').style.display = 'block';
    document.getElementById('lobbyArea').style.display = 'none';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
});
</script>
</body>
</html>
