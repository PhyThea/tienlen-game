<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🃏 Tien Len Online</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #334155;
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn-primary { background: #22c55e; color: white; }
.btn-primary:hover { background: #16a34a; }
.btn-secondary { background: #3b82f6; color: white; }
.btn-secondary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }

.room-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

.room-item button {
    width: auto;
    margin-top: 0;
    padding: 8px 15px;
}

/* Game Layout */
#lobby { display: block; }
#gameTable { display: none; }

body.in-game #lobby { display: none; }
body.in-game #gameTable { display: block; }

.game-grid {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: calc(100vh - 30px);
    gap: 15px;
}

/* Players Status Grid */
.players-overview {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.player-card {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    border: 2px solid transparent;
    font-size: 14px;
    position: relative;
}

.player-card.active-turn {
    border-color: #22c55e;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
}

.player-card.passed {
    opacity: 0.5;
    background: #0f172a;
}

.badge-passed {
    background: #ef4444;
    color: white;
    font-size: 11px;
    padding: 2px 5px;
    border-radius: 5px;
    position: absolute;
    top: -5px;
    right: -5px;
}

/* Play Zone Area */
.play-zone {
    background: #064e3b;
    border: 3px dashed #047857;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 180px;
    padding: 20px;
    position: relative;
}

.zone-title {
    font-size: 18px;
    font-weight: bold;
    color: #a7f3d0;
    margin-bottom: 15px;
}

/* Card Styling */
.cards-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
}

.card {
    width: 60px;
    height: 85px;
    background: white;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 5px;
    font-weight: bold;
    font-size: 16px;
    user-select: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    position: relative;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
}

.card.red { color: #ef4444; }
.card.black { color: #000000; }

.card .bot-right {
    transform: rotate(180deg);
    align-self: flex-end;
}

/* My Hand Selection Interaction */
.my-hand-zone {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
}

.my-hand-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: -15px;
    padding: 10px 0;
}

.my-hand-container .card {
    margin-left: -10px;
    transition: transform 0.2s;
}
.my-hand-container .card:first-child { margin-left: 0; }

.my-hand-container .card.selected {
    transform: translateY(-20px);
    box-shadow: 0 0 12px #eab308;
    border: 2px solid #eab308;
}

/* Control Buttons Layout */
.action-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 15px;
}

/* Popup Dialog Modal */
.modal-overlay {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(15, 23, 42, 0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 20px;
}

.modal-content {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    max-width: 450px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.result-row {
    display: flex;
    flex-direction: column;
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    text-align: left;
}

.result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 8px;
}

.rank-badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 13px;
}
.rank-1 { background: #eab308; color: black; }
.rank-2 { background: #94a3b8; color: black; }
.rank-3 { background: #b45309; color: white; }
.rank-4 { background: #ef4444; color: white; }

@media(max-width: 600px) {
    .card { width: 48px; height: 68px; font-size: 13px; padding: 3px; }
    .player-card { font-size: 11px; padding: 6px 3px; }
    .zone-title { font-size: 15px; }
    .action-controls button { font-size: 14px; padding: 10px; }
}
</style>
</head>
<body>

<div class="container">
    
    <div id="lobby">
        <h1>🃏 Tien Len Online</h1>
        
        <div class="panel">
            <h3>⚙️ គណនីរបស់អ្នក</h3>
            <input type="text" id="playerNameInput" placeholder="បញ្ចូលឈ្មោះរបស់អ្នកនៅទីនេះ..." value="អ្នកលេង">
        </div>

        <div class="panel">
            <h3>🏠 បង្កើតបន្ទប់ថ្មី</h3>
            <button class="btn-primary" onclick="createRoom()">➕ បង្កើតបន្ទប់លេងថ្មី</button>
        </div>

        <div class="panel">
            <h3>📋 បញ្ជីបន្ទប់កំពុងរង់ចាំ</h3>
            <div id="roomListContainer">
                <p style="color: #94a3b8; text-align: center; padding: 10px;">មិនទាន់មានបន្ទប់ណាបង្កើតឡើយ...</p>
            </div>
        </div>
    </div>

    <div id="gameTable">
        <div class="game-grid">
            
            <div class="players-overview" id="playersOverviewZone">
                </div>

            <div class="play-zone">
                <div class="zone-title" id="tableStatusTitle">រង់ចាំម្ចាស់បន្ទប់ចាប់ផ្ដើម...</div>
                <div class="cards-container" id="centralTableCards">
                    </div>
                <div id="lastActionLabel" style="margin-top: 10px; font-size: 13px; color: #cbd5e1;"></div>
            </div>

            <div class="my-hand-zone">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <span style="font-weight:bold; color:#eab308;">🃏 បៀរក្នុងដៃរបស់អ្នក:</span>
                    <button id="hostStartGameBtn" class="btn-primary" style="display:none; width:auto; margin:0; padding:6px 15px; font-size:13px;" onclick="startGame()">▶️ ចាប់ផ្ដើមហ្គេម</button>
                </div>
                
                <div class="my-hand-container" id="myHandCardsContainer">
                    </div>

                <div class="action-controls">
                    <button class="btn-primary" onclick="playSelectedCards()">🎯 ចុះបៀរ (Play)</button>
                    <button class="btn-secondary" onclick="passTurn()">❌ រំលង (Pass)</button>
                </div>
                
                <button class="btn-danger" style="margin-top: 15px;" onclick="leaveRoom()">🚪 ចាកចេញពីបន្ទប់</button>
            </div>

        </div>
    </div>

</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <h2 style="color: #eab308; margin-bottom: 15px;">🏆 លទ្ធផលបញ្ចប់ហ្គេម 🏆</h2>
        <div id="resultListContainer">
            </div>
        <button id="hostPlayAgainBtn" class="btn-primary" style="margin-top:20px; display:none;" onclick="startGame()">🔄 លេងម្ដងទៀត</button>
        <p id="waitHostText" style="margin-top:20px; color:#94a3b8; display:none;">សូមរង់ចាំម្ចាស់បន្ទប់ចុចលេងម្ដងទៀត...</p>
        <button class="btn-danger" style="margin-top: 10px;" onclick="closeModalAndLeave()">🚪 ត្រឡប់ទៅក្រៅវិញ</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myId = null;
let currentRoom = null;
let isCreator = false;
let amISpectator = false;

let myHand = [];
let selectedCards = [];
let playersData = [];
let currentTurnIndexGlobal = 0;

// ទិន្នន័យជំនួយបង្ហាញរូបសញ្ញាបៀរ
const suitIcons = { '♠': '♠', '♣': '♣', '♦': '♦', '♥': '♥' };
const suitClasses = { '♠': 'black', '♣': 'black', '♦': 'red', '♥': 'red' };

function getPlayerName() {
    return document.getElementById('playerNameInput').value.trim() || 'អ្នកលេង';
}

// -----------------------------------------------------
// LOBBY FUNCTIONS
// -----------------------------------------------------
function createRoom() {
    socket.emit('createRoom', { playerName: getPlayerName() });
}

function joinRoom(roomId) {
    socket.emit('joinRoom', { roomId, playerName: getPlayerName() });
}

socket.on('roomList', (rooms) => {
    const container = document.getElementById('roomListContainer');
    container.innerHTML = '';
    
    const waitingRooms = rooms.filter(r => r.status === 'waiting');
    if (waitingRooms.length === 0) {
        container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 10px;">មិនទាន់មានបន្ទប់ណាបង្កើតឡើយ...</p>';
        return;
    }

    waitingRooms.forEach(r => {
        const div = document.createElement('div');
        div.className = 'room-item';
        div.innerHTML = `
            <div>
                <strong>🏠 បន្ទប់របស់: ${r.creatorName}</strong> <br>
                <span style="font-size:12px; color:#cbd5e1;">👥 ចំនួនមនុស្ស: ${r.playerCount}/4 នាក់</span>
            </div>
            <button class="btn-secondary" onclick="joinRoom('${r.id}')">ចូលរួម</button>
        `;
        container.appendChild(div);
    });
});

socket.on('joinedRoom', ({ roomId, isCreator: creatorStatus, myId: serverId }) => {
    currentRoom = roomId;
    isCreator = creatorStatus;
    myId = serverId;
    
    document.body.classList.add('in-game');
    document.getElementById('resultModal').style.display = 'none';
    
    if (isCreator) {
        document.getElementById('hostStartGameBtn').style.display = 'block';
        document.getElementById('tableStatusTitle').innerText = "សូមចុចចាប់ផ្ដើមហ្គេម!";
    } else {
        document.getElementById('hostStartGameBtn').style.display = 'none';
        document.getElementById('tableStatusTitle').innerText = "រង់ចាំម្ចាស់បន្ទប់ចាប់ផ្ដើម...";
    }
});

socket.on('errorMsg', (msg) => {
    alert(msg);
});

// -----------------------------------------------------
// GAMEPLAY ACTIONS
// -----------------------------------------------------
function startGame() {
    socket.emit('startGame');
}

socket.on('gameStarted', ({ hand, currentTurnIndex, lastPlayedCards, isSpectator }) => {
    myHand = hand;
    selectedCards = [];
    amISpectator = isSpectator;
    currentTurnIndexGlobal = currentTurnIndex;
    
    document.getElementById('resultModal').style.display = 'none';
    document.getElementById('hostStartGameBtn').style.display = 'none';
    document.getElementById('lastActionLabel').innerText = "ហ្គេមបានចាប់ផ្ដើមហើយ!";
    
    renderMyHand();
    renderCentralTable(lastPlayedCards);
});

function renderMyHand() {
    const container = document.getElementById('myHandCardsContainer');
    container.innerHTML = '';
    
    if (amISpectator) {
        container.innerHTML = '<p style="color:#eab308; text-align:center; width:100%;">👀 អ្នកកំពុងចូលមើលការលេង (Spectator)</p>';
        return;
    }

    if (myHand.length === 0) {
        container.innerHTML = '<p style="color:#22c55e; text-align:center; width:100%;">🎉 អ្នកអស់បៀរពីដៃហើយ!</p>';
        return;
    }

    myHand.forEach((card) => {
        const cardDiv = document.createElement('div');
        const isSelected = selectedCards.some(c => c.value === card.value && c.suit === card.suit);
        
        cardDiv.className = `card ${suitClasses[card.suit]} ${isSelected ? 'selected' : ''}`;
        cardDiv.innerHTML = `
            <div>${card.value}</div>
            <div style="font-size:24px; align-self:center;">${suitIcons[card.suit]}</div>
            <div class="bot-right">${card.value}</div>
        `;
        
        cardDiv.onclick = () => toggleSelectCard(card);
        container.appendChild(cardDiv);
    });
}

function toggleSelectCard(card) {
    const foundIdx = selectedCards.findIndex(c => c.value === card.value && c.suit === card.suit);
    if (foundIdx === -1) {
        selectedCards.push(card);
    } else {
        selectedCards.splice(foundIdx, 1);
    }
    renderMyHand();
}

function renderCentralTable(cards) {
    const container = document.getElementById('centralTableCards');
    container.innerHTML = '';
    
    if (!cards || cards.length === 0) {
        container.innerHTML = '<span style="color:#a7f3d0; opacity:0.6;">♣️ តុទំនេរ - ក្ដារដំបូង ឬគ្រប់គ្នាអោនអស់ ♠️</span>';
        return;
    }

    cards.forEach(card => {
        const cardDiv = document.createElement('div');
        cardDiv.className = `card ${suitClasses[card.suit]}`;
        cardDiv.innerHTML = `
            <div>${card.value}</div>
            <div style="font-size:24px; align-self:center;">${suitIcons[card.suit]}</div>
            <div class="bot-right">${card.value}</div>
        `;
        container.appendChild(cardDiv);
    });
}

function isMyTurn() {
    if (amISpectator) return false;
    const myData = playersData.find(p => p.id === myId);
    if (!myData) return false;
    const currentTurnPlayer = playersData.find((p, idx) => idx === currentTurnIndexGlobal);
    return currentTurnPlayer && currentTurnPlayer.id === myId;
}

socket.on('updatePlayers', (players) => {
    playersData = players;
    updatePlayersOverviewUI();
});

function updatePlayersOverviewUI() {
    const container = document.getElementById('playersOverviewZone');
    container.innerHTML = '';

    playersData.forEach((p, idx) => {
        const isCurrentTurn = (idx === currentTurnIndexGlobal && document.getElementById('tableStatusTitle').innerText !== "រង់ចាំម្ចាស់បន្ទប់ចាប់ផ្ដើម...");
        const cardDiv = document.createElement('div');
        cardDiv.className = `player-card ${isCurrentTurn ? 'active-turn' : ''} ${p.hasPassed ? 'passed' : ''}`;
        
        let subText = '';
        if (p.isSpectator) {
            subText = '👁️ ចូលមើល';
        } else if (p.rank) {
            subText = `🏁 ចំណាត់ថ្នាក់: ${p.rank}`;
        } else {
            subText = `🎴 បៀរខ្ទាស់: ${p.hand ? p.hand.length : 0} សន្លឹក`;
        }

        cardDiv.innerHTML = `
            <strong>👤 ${p.name} ${p.id === myId ? '<span style="color:#22c55e;">(ខ្ញុំ)</span>' : ''}</strong>
            <div style="font-size:12px; margin-top:5px; color:#cbd5e1;">${subText}</div>
            ${p.hasPassed ? '<span class="badge-passed">អោន (Pass)</span>' : ''}
        `;
        container.appendChild(cardDiv);
    });
}

function playSelectedCards() {
    if (!isMyTurn()) return alert("មិនទាន់ដល់វេនរបស់អ្នកឡើយ!");
    if (selectedCards.length === 0) return alert("សូមជ្រើសរើសសន្លឹកបៀរមុននឹងចុះ!");
    socket.emit('playCards', { roomId: currentRoom, cards: selectedCards });
}

function passTurn() {
    if (!isMyTurn()) return alert("មិនទាន់ដល់វេនរបស់អ្នកឡើយ!");
    socket.emit('passTurn', { roomId: currentRoom });
}

// *** ស្ដាប់ Event 'cardPlayed' ពី Server ឱ្យត្រូវគ្នា ***
socket.on('cardPlayed', ({ cards, nextTurn, id, name, roomPlayers }) => {
    currentTurnIndexGlobal = nextTurn;
    playersData = roomPlayers;
    
    document.getElementById('lastActionLabel').innerText = `O ${name} បានចុះបៀរ ${cards.length} សន្លឹក`;
    document.getElementById('tableStatusTitle').innerText = isMyTurn() ? "ដល់វេនរបស់អ្នកហើយ! 🎯" : `វេនរបស់៖ ${roomPlayers[nextTurn]?.name}`;
    
    renderCentralTable(cards);
    updatePlayersOverviewUI();
});

socket.on('turnPassed', ({ nextTurn, id, name, roomPlayers }) => {
    currentTurnIndexGlobal = nextTurn;
    playersData = roomPlayers;

    document.getElementById('lastActionLabel').innerText = `X ${name} បានអោន (Pass)`;
    document.getElementById('tableStatusTitle').innerText = isMyTurn() ? "ដល់វេនរបស់អ្នកហើយ! 🎯" : `វេនរបស់៖ ${roomPlayers[nextTurn]?.name}`;
    
    updatePlayersOverviewUI();
});

socket.on('updateHand', (newHand) => {
    myHand = newHand;
    selectedCards = [];
    renderMyHand();
});

socket.on('playerFinished', ({ name, rank }) => {
    alert(`🎉 អ្នកលេង [ ${name} ] អស់បៀរពីដៃមុនគេ និងទទួលបានចំណាត់ថ្នាក់លេខ ${rank}!`);
});

socket.on('turnChanged', ({ currentTurnIndex }) => {
    currentTurnIndexGlobal = currentTurnIndex;
    updatePlayersOverviewUI();
});

// -----------------------------------------------------
// GAME OVER SCOREBOARD
// -----------------------------------------------------
socket.on('gameFinished', ({ results }) => {
    const modal = document.getElementById('resultModal');
    const resultList = document.getElementById('resultListContainer');
    
    resultList.innerHTML = '';
    modal.style.display = 'flex';

    results.forEach(p => {
        const playerDiv = document.createElement('div');
        playerDiv.className = 'result-row';
        
        let rankClass = `rank-${p.rank || 4}`;
        let rankBadgeHTML = `<span class="rank-badge ${rankClass}">លេខ ${p.rank || 'ស្អុយ'}</span>`;
        
        let cardsHTML = '';
        let countText = '';
        if (p.remainingCards && p.remainingCards.length > 0) {
            countText = `<span style="font-size:12px; color:#94a3b8;"> (នៅសល់ ${p.remainingCards.length} សន្លឹក)</span>`;
            p.remainingCards.forEach(c => {
                cardsHTML += `<span style="background:white; color:${suitClasses[c.suit] === 'red' ? '#ef4444':'black'}; padding:2px 5px; border-radius:4px; font-size:12px; margin-right:4px; font-weight:bold; display:inline-block; margin-top:4px;">${c.value}${suitIcons[c.suit]}</span>`;
            });
        } else {
            cardsHTML = '<span style="color:#22c55e; font-size:12px;">🏆 អស់បៀរពីដៃ</span>';
        }

        playerDiv.innerHTML = `
            <div class="result-header">
                <div>
                    <strong>👤 ${p.name} ${p.id === myId ? '<span style="color:#22c55e;">(ខ្ញុំ)</span>' : ''}</strong>
                    ${countText}
                </div>
                <div>${rankBadgeHTML}</div>
            </div>
            <div class="result-cards" style="display: flex; flex-wrap: wrap; align-items: center; min-height: 40px;">${cardsHTML}</div>
        `;
        resultList.appendChild(playerDiv);
    });

    const playAgainBtn = document.getElementById('hostPlayAgainBtn');
    const waitText = document.getElementById('waitHostText');
    if (isCreator) {
        playAgainBtn.style.display = 'block';
        waitText.style.display = 'none';
    } else {
        playAgainBtn.style.display = 'none';
        waitText.style.display = 'block';
    }
});

function leaveRoom() {
    if (confirm("តើអ្នកពិតជាចង់ចាកចេញពីបន្ទប់នេះមែនទេ?")) {
        socket.emit('leaveRoom');
    }
}

socket.on('leftRoom', () => {
    document.body.classList.remove('in-game');
    currentRoom = null;
    myHand = [];
    selectedCards = [];
    playersData = [];
    amISpectator = false;
    currentTurnIndexGlobal = 0;
    
    document.getElementById('centralTableCards').innerHTML = '';
    document.getElementById('resultModal').style.display = 'none';
});

function closeModalAndLeave() {
    socket.emit('leaveRoom');
}
</script>
</body>
</html>
