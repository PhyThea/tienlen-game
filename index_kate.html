<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>👑 បៀរ កាតេ អនឡាញ (Ka Te)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: Arial, sans-serif; background: #0b1329; color: white; overflow: hidden; position: fixed; width: 100vw; height: 100vh; height: 100dvh; }
.container { max-width: 1200px; margin: auto; padding: 10px; width: 100%; height: 100%; }
h1 { text-align: center; margin-bottom: 12px; font-size: 22px; color: #22c55e; }
.panel { background: #1c2541; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
input { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; background: #3a506b; color: white; }
button { background: #22c55e; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
button:hover { background: #16a34a; }
.btn-danger { background: #ef4444; }
.btn-danger:hover { background: #dc2626; }
.btn-secondary { background: #64748b; }
.btn-secondary:hover { background: #475569; }

/* Game Dashboard Setup */
#lobbySection { display: block; overflow-y: auto; height: calc(100vh - 40px); }
#gameSection { display: none; height: 100%; position: relative; }

/* Game Board Layout */
.game-grid { display: grid; grid-template-rows: auto 1fr auto; height: 100%; padding-bottom: 20px; }
.game-header { display: flex; justify-content: space-between; align-items: center; background: #1c2541; padding: 10px; border-radius: 10px; }
.game-body { position: relative; display: flex; justify-content: center; align-items: center; margin: 15px 0; }

/* Table and Arena Center */
.game-table { width: 100%; max-width: 500px; aspect-ratio: 1; background: radial-gradient(circle, #0f4c5c 0%, #0b2545 100%); border: 6px solid #3a506b; border-radius: 50%; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
.center-pool { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: -20px; justify-content: center; align-items: center; width: 70%; height: 70%; }

/* Card Components Styling */
.card-item { width: 55px; height: 80px; background: white; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 15px; color: black; box-shadow: 0 4px 8px rgba(0,0,0,0.3); position: relative; user-select: none; transition: transform 0.2s; }
.card-item.red { color: #ef4444; }
.card-item.selected { transform: translateY(-15px) scale(1.05); border: 3px solid #22c55e; }
.card-item.tipped { background: linear-gradient(135deg, #3a506b 0%, #1c2541 100%); border: 2px solid #5bc0be; }
.card-item.tipped * { display: none !important; }
.card-item.tipped::after { content: "🔒"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; display: block !important; }
.card-suit-center { font-size: 24px; text-align: center; align-self: center; }

/* Multi-Player Layout Positions Around the Circle Table */
.player-node { position: absolute; display: flex; flex-direction: column; align-items: center; text-align: center; width: 90px; z-index: 10; }
.player-node .avatar { width: 45px; height: 45px; background: #3a506b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; border: 3px solid #64748b; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
.player-node.active-turn .avatar { border-color: #22c55e; animation: pulse 1.5s infinite; }
.player-node .info { font-size: 11px; margin-top: 4px; background: rgba(11,19,41,0.8); padding: 2px 6px; border-radius: 10px; width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-node .badge-win { font-size: 10px; color: #eab308; font-weight: bold; }
.player-node .voice-status { font-size: 9px; color: #64748b; }

/* Positions calculations around round table circle */
.p-pos-0 { bottom: -20px; left: 50%; transform: translateX(-50%); } 
.p-pos-1 { bottom: 20%; left: -35px; } 
.p-pos-2 { top: 20%; left: -35px; } 
.p-pos-3 { top: -25px; left: 50%; transform: translateX(-50%); } 
.p-pos-4 { top: 20%; right: -35px; } 
.p-pos-5 { bottom: 20%; right: -35px; } 

/* Table Arena Cards Inside Pool Positions */
.table-card-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; }
.tc-pos-0 { bottom: 15%; left: 50%; transform: translateX(-50%); }
.tc-pos-1 { bottom: 30%; left: 20%; }
.tc-pos-2 { top: 30%; left: 20%; }
.tc-pos-3 { top: 15%; left: 50%; transform: translateX(-50%); }
.tc-pos-4 { top: 30%; right: 20%; }
.tc-pos-5 { bottom: 30%; right: 20%; }
.tc-owner-name { font-size: 9px; color: #94a3b8; margin-top: 2px; background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 4px; }

/* Client Controls Hand Cards Styling */
.game-footer { display: flex; flex-direction: column; gap: 8px; background: #1c2541; padding: 12px; border-radius: 15px; }
.my-hand-container { display: flex; gap: 6px; justify-content: center; overflow-x: auto; padding: 10px 0; min-height: 105px; }
.action-control-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Result Popup Overlay Modal Layout */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(11,19,41,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 15px; visibility: hidden; opacity: 0; transition: opacity 0.3s; }
.modal-overlay.show { visibility: visible; opacity: 1; }
.modal-box { background: #1c2541; width: 100%; max-width: 480px; border-radius: 20px; padding: 20px; border: 3px solid #22c55e; box-shadow: 0 15px 30px rgba(0,0,0,0.5); text-align: center; max-height: 90vh; overflow-y: auto; }
.result-list { margin: 15px 0; text-align: left; display: flex; flex-direction: column; gap: 10px; }
.result-row { display: flex; align-items: center; justify-content: space-between; background: #0b1329; padding: 10px; border-radius: 10px; border-left: 5px solid #64748b; }
.result-row.winner-row { border-left-color: #22c55e; background: rgba(34,197,94,0.1); }
.result-row.tiv-row { border-left-color: #ef4444; background: rgba(239,68,68,0.05); }
.result-row.long-row { border-left-color: #f97316; }
.result-cards { display: flex; gap: 3px; }
.mini-card { width: 22px; height: 32px; background: white; border-radius: 3px; font-size: 7px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 2px; font-weight: bold; }
.mini-card.red { color: #ef4444; }

@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
</style>
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>

<div class="container">
    <div id="lobbySection">
        <h1>👑 បៀរ កាតេ អនឡាញ (Ka Te)</h1>
        <div class="panel">
            <h3>🔑 ចូលរួមលេង ឬ បង្កើតបន្ទប់ថ្មី</h3>
            <input type="text" id="playerNameInput" placeholder="វាយឈ្មោះរបស់អ្នកនៅទីនេះ...">
            <input type="text" id="roomIdInput" placeholder="លេខបន្ទប់ (ឧទាហរណ៍៖ 101)">
            <input type="password" id="roomPassInput" placeholder="លេខកូដបន្ទប់ (បើមាន)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btnCreateRoom">🏠 បង្កើតបន្ទប់</button>
                <button id="btnJoinRoom" class="btn-secondary">🚪 ចូលរួមបន្ទប់</button>
            </div>
        </div>
    </div>

    <div id="gameSection">
        <div class="game-grid">
            <div class="game-header">
                <div>បន្ទប់: <span id="displayRoomId" style="color:#22c55e; font-weight:bold;">-</span></div>
                <div>ជុំទី: <span id="displayRound" style="color:#eab308; font-weight:bold;">1/6</span></div>
                <button id="btnStartGame" style="margin:0; width:auto; padding:6px 15px; display:none;">▶️ ចាប់ផ្តើម</button>
                <button id="btnResetGame" class="btn-danger" style="margin:0; width:auto; padding:6px 15px; display:none;">🔄 កំណត់ឡើងវិញ</button>
            </div>

            <div class="game-body">
                <div class="game-table">
                    <div id="playersCircleContainer"></div>
                    <div class="center-pool" id="tableCardsPool"></div>
                </div>
            </div>

            <div class="game-footer">
                <div style="font-size:13px; text-align:center; color:#94a3b8;" id="gameTurnStatusText">សូមរង់ចាំហ្គេមចាប់ផ្តើម...</div>
                <div class="my-hand-container" id="myHandCardsContainer"></div>
                <div class="action-control-group">
                    <button id="btnActionPlay">🃏 ចេញបៀរ / គប់</button>
                    <button id="btnActionTip" class="btn-secondary">🔒 ធីបបៀរ (លាក់)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-box">
        <h2 style="color:#22c55e;" id="modalWinnerTitle">🎉 លទ្ធផលបញ្ចប់ហ្គេម</h2>
        <div class="result-list" id="modalResultList"></div>
        <button id="btnCloseModal" class="btn-secondary">យល់ព្រម</button>
    </div>
</div>

<div id="remoteAudios" style="display:none;"></div>

<script>
const socket = io();
let currentRoomId = null;
let myPlayerId = null;
let selectedCard = null;
let currentPlayersList = [];

let localStream = null;
let peers = {};

const suitSymbols = { 'Spades': '♠️', 'Hearts': '♥️', 'Diamonds': '♦️', 'Clubs': '♣️' };
const suitClasses = { 'Spades': '', 'Hearts': 'red', 'Diamonds': 'red', 'Clubs': '' };

async function initAudioStream() {
    if (localStream) return;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (err) {
        console.warn("មិនអាចបើកមីក្រូហ្វូនបានទេ:", err);
    }
}

document.getElementById('btnCreateRoom').addEventListener('click', () => {
    const name = document.getElementById('playerNameInput').value.trim();
    const room = document.getElementById('roomIdInput').value.trim();
    const pass = document.getElementById('roomPassInput').value.trim();
    if(!room) return alert("សូមបញ្ចូលលេខបន្ទប់!");
    initAudioStream().then(() => {
        socket.emit('kt_createRoom', { roomId: room, password: pass, playerName: name });
    });
});

document.getElementById('btnJoinRoom').addEventListener('click', () => {
    const name = document.getElementById('playerNameInput').value.trim();
    const room = document.getElementById('roomIdInput').value.trim();
    const pass = document.getElementById('roomPassInput').value.trim();
    if(!room) return alert("សូមបញ្ចូលលេខបន្ទប់!");
    initAudioStream().then(() => {
        socket.emit('kt_joinRoom', { roomId: room, password: pass, playerName: name });
    });
});

document.getElementById('btnStartGame').addEventListener('click', () => {
    if(currentRoomId) socket.emit('kt_startGame', { roomId: currentRoomId });
});

document.getElementById('btnResetGame').addEventListener('click', () => {
    if(currentRoomId) socket.emit('kt_resetGame', { roomId: currentRoomId });
});

document.getElementById('btnActionPlay').addEventListener('click', () => {
    if(!selectedCard) return alert("សូមជ្រើសរើសសន្លឹកបៀរ១សិន!");
    socket.emit('kt_playCard', { roomId: currentRoomId, card: selectedCard, isTip: false });
    selectedCard = null;
});

document.getElementById('btnActionTip').addEventListener('click', () => {
    if(!selectedCard) return alert("សូមជ្រើសរើសសន្លឹកបៀរ១សិន!");
    socket.emit('kt_playCard', { roomId: currentRoomId, card: selectedCard, isTip: true });
    selectedCard = null;
});

document.getElementById('btnCloseModal').addEventListener('click', () => {
    document.getElementById('resultModal').classList.remove('show');
});

socket.on('roomCreated', (data) => {
    currentRoomId = data.roomId;
    myPlayerId = data.playerId;
    switchToGameUI();
});

socket.on('roomJoined', (data) => {
    currentRoomId = data.roomId;
    myPlayerId = data.playerId;
    switchToGameUI();
});

socket.on('errorMsg', (msg) => { alert(msg); });

socket.on('updatePlayers', (players) => {
    currentPlayersList = players;
    renderPlayersAndTable([], null);
    
    const isCreator = players[0] && players[0].id === myPlayerId;
    if(isCreator) {
        document.getElementById('btnStartGame').style.display = 'block';
        document.getElementById('btnResetGame').style.display = 'block';
    } else {
        document.getElementById('btnStartGame').style.display = 'none';
        document.getElementById('btnResetGame').style.display = 'none';
    }
});

socket.on('gameStarted', (data) => {
    document.getElementById('resultModal').classList.remove('show');
    document.getElementById('btnStartGame').style.display = 'none';
    currentPlayersList = data.players;
    renderPlayersAndTable([], data.currentTurn);
    updateMyHandControls(data.players, 1);
});

socket.on('updateTurn', (data) => {
    if (data.players) {
        currentPlayersList = data.players;
    }
    const currentRound = currentPlayersList[0] ? (6 - currentPlayersList[0].hand.length) : 1;
    renderPlayersAndTable(data.tableCards, data.currentTurn);
    updateMyHandControls(currentPlayersList, currentRound);
});

socket.on('gameWon', (data) => {
    renderPlayersAndTable([], null);
    showFinalResultsModal(data.allHands, data.winner);
});

socket.on('gameReset', (players) => {
    currentPlayersList = players;
    renderPlayersAndTable([], null);
    document.getElementById('myHandCardsContainer').innerHTML = '';
    document.getElementById('displayRound').innerText = '1/6';
    document.getElementById('gameTurnStatusText').innerText = 'ហ្គេមត្រូវបានកំណត់ឡើងវិញ។ រង់ចាំចាប់ផ្តើម...';
    document.getElementById('resultModal').classList.remove('show');
    
    const isCreator = players[0] && players[0].id === myPlayerId;
    if(isCreator) document.getElementById('btnStartGame').style.display = 'block';
});

function switchToGameUI() {
    document.getElementById('lobbySection').style.display = 'none';
    document.getElementById('gameSection').style.display = 'block';
    document.getElementById('displayRoomId').innerText = currentRoomId;
}

function renderPlayersAndTable(tableCards, currentTurnId) {
    const playersContainer = document.getElementById('playersCircleContainer');
    const tablePool = document.getElementById('tableCardsPool');
    playersContainer.innerHTML = '';
    tablePool.innerHTML = '';

    const myIndex = currentPlayersList.findIndex(p => p.id === myPlayerId);
    const sortedPlayers = [];
    if(myIndex !== -1) {
        for(let i=0; i<currentPlayersList.length; i++) {
            sortedPlayers.push(currentPlayersList[(myIndex + i) % currentPlayersList.length]);
        }
    } else {
        sortedPlayers.push(...currentPlayersList);
    }

    sortedPlayers.forEach((player, index) => {
        const node = document.createElement('div');
        node.className = `player-node p-pos-${index}`;
        if(player.id === currentTurnId) node.classList.add('active-turn');

        let statusSymbol = "";
        if (player.isTiv) {
            statusSymbol = "🖐️ ទីវ";
        } else if (player.isSpectator) {
            statusSymbol = "❌ លង់";
        }

        node.innerHTML = `
            <div class="avatar">${player.name.substring(0,2)}</div>
            <div class="info">
                <div>${player.name} ${player.id === myPlayerId ? '(ខ្ញុំ)' : ''}</div>
                <div class="badge-win">🏆 ស៊ីបាន: ${player.winRounds || 0} ដង</div>
                <div style="color: #ef4444; font-weight: bold;">${statusSymbol}</div>
                <div class="voice-status" id="v_${player.id}">🔇 បិទសំឡេង</div>
            </div>
        `;
        playersContainer.appendChild(node);
    });

    tableCards.forEach((tc) => {
        const pIdx = currentPlayersList.findIndex(p => p.id === tc.playerId);
        let absolutePosIdx = 0;
        if(myIndex !== -1 && pIdx !== -1) {
            absolutePosIdx = (pIdx - myIndex + currentPlayersList.length) % currentPlayersList.length;
        } else if(pIdx !== -1) {
            absolutePosIdx = pIdx;
        }

        const wrap = document.createElement('div');
        wrap.className = `table-card-wrapper tc-pos-${absolutePosIdx}`;

        const cardDiv = document.createElement('div');
        cardDiv.className = `card-item ${suitClasses[tc.card.suit] || ''}`;
        if(tc.isTip) {
            cardDiv.classList.add('tipped');
        } else {
            cardDiv.innerHTML = `
                <div>${tc.card.value}</div>
                <div class="card-suit-center">${suitSymbols[tc.card.suit]}</div>
                <div style="text-align:right; transform: rotate(180deg);">${tc.card.value}</div>
            `;
        }

        const nameLabel = document.createElement('div');
        nameLabel.className = 'tc-owner-name';
        nameLabel.innerText = tc.playerName;

        wrap.appendChild(cardDiv);
        wrap.appendChild(nameLabel);
        tablePool.appendChild(wrap);
    });
}

function updateMyHandControls(players, round) {
    document.getElementById('displayRound').innerText = `${round}/6`;
    const me = players.find(p => p.id === myPlayerId);
    const handContainer = document.getElementById('myHandCardsContainer');
    handContainer.innerHTML = '';

    const btnTip = document.getElementById('btnActionTip');
    if (round === 5) {
        btnTip.disabled = true;
        btnTip.style.opacity = "0.4";
        btnTip.innerText = "🔒 ហាមធីប (វគ្គគប់)";
    } else {
        btnTip.disabled = false;
        btnTip.style.opacity = "1";
        btnTip.innerText = "🔒 ធីបបៀរ (លាក់)";
    }

    if(!me || !me.hand || me.hand.length === 0) {
        document.getElementById('gameTurnStatusText').innerText = "អ្នកអស់បៀរក្នុងដៃហើយ ឬកំពុងរង់ចាំកាត់សេចក្តី...";
        return;
    }

    me.hand.forEach((card) => {
        const cDiv = document.createElement('div');
        cDiv.className = `card-item ${suitClasses[card.suit] || ''}`;
        cDiv.innerHTML = `
            <div>${card.value}</div>
            <div class="card-suit-center">${suitSymbols[card.suit]}</div>
            <div style="text-align:right; transform: rotate(180deg);">${card.value}</div>
        `;

        cDiv.addEventListener('click', () => {
            document.querySelectorAll('.my-hand-container .card-item').forEach(c => c.classList.remove('selected'));
            cDiv.classList.add('selected');
            selectedCard = card;
        });

        handContainer.appendChild(cDiv);
    });
}

function showFinalResultsModal(allHands, winnerName) {
    document.getElementById('modalWinnerTitle').innerText = `🏆 អ្នកឈ្នះ៖ ${winnerName}`;
    const listContainer = document.getElementById('modalResultList');
    listContainer.innerHTML = '';

    allHands.forEach(p => {
        const row = document.createElement('div');
        row.className = 'result-row';
        if(p.finalWinner) row.classList.add('winner-row');
        if(p.isTiv) row.classList.add('tiv-row');

        let cardsHtml = '';
        if(p.initialHandCopy) {
            p.initialHandCopy.forEach(c => {
                cardsHtml += `
                    <div class="mini-card ${suitClasses[c.suit] || ''}">
                        <div>${c.value}</div>
                        <div style="text-align:center; font-size:10px;">${suitSymbols[c.suit]}</div>
                    </div>
                `;
            });
        }

        row.innerHTML = `
            <div>
                <strong>${p.name}</strong> 
                <span style="font-size:11px; display:block; color:#a1a1aa;">${p.gameStatus} (ស៊ីបាន ${p.winRounds}ដង)</span>
            </div>
            <div class="result-cards">${cardsHtml}</div>
        `;
        listContainer.appendChild(row);
    });

    document.getElementById('resultModal').classList.add('show');
}

socket.on('voice_users_list', (users) => {
    users.forEach(userId => {
        if (!peers[userId] && userId !== socket.id) {
            initiatePeerConnection(userId, true);
        }
    });
});

function initiatePeerConnection(targetSocketId, isInitiator) {
    if (!localStream) return;
    const peer = new SimplePeer({
        initiator: isInitiator,
        trickle: false,
        stream: localStream
    });

    peer.on('signal', (signal) => {
        socket.emit('voice_signal', { target: targetSocketId, signal: signal });
    });

    peer.on('stream', (remoteStream) => {
        let audio = document.getElementById("audio_" + targetSocketId);
        if (!audio) {
            audio = document.createElement('audio');
            audio.id = "audio_" + targetSocketId;
            audio.autoplay = true;
            document.getElementById('remoteAudios').appendChild(audio);
        }
        audio.srcObject = remoteStream;
        
        const vIndicator = document.getElementById("v_" + targetSocketId);
        if(vIndicator) { vIndicator.innerText = "🎙️ កំពុងនិយាយ"; vIndicator.style.color = "#22c55e"; }
    });

    peer.on('error', (err) => { console.error('Peer error:', err); });
    
    peer.on('close', () => {
        removeAudioElement(targetSocketId);
    });

    peers[targetSocketId] = peer;
}

function removeAudioElement(id) {
    const audio = document.getElementById("audio_" + id);
    if (audio) { audio.remove(); }
    const vIndicator = document.getElementById("v_" + id);
    if(vIndicator) { vIndicator.innerText = "🔇 បានចាកចេញ"; vIndicator.style.color = "#64748b"; }
}

socket.on('voice_signal', (data) => {
    if (peers[data.sender]) { peers[data.sender].signal(data.signal); }
});

socket.on('voice_user_left', (data) => {
    const userSocketId = typeof data === 'object' ? data.id : data;
    if (peers[userSocketId]) {
        try { peers[userSocketId].destroy(); } catch(e){}
        delete peers[userSocketId];
    }
    removeAudioElement(userSocketId);
});
</script>
</body>
