<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>👑 បៀរ កាតេ អនឡាញ (Ka Te)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0b1329; color: white; overflow: hidden; width: 100vw; height: 100vh; }
    .container { max-width: 1200px; margin: auto; padding: 10px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    .panel { background: #1c2541; padding: 15px; border-radius: 15px; }
    input, button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; }
    input { background: #3a506b; color: white; }
    button { cursor: pointer; }
    .btn-blue { background: #3b82f6; color: white; }
    .btn-green { background: #22c55e; color: white; }
    .btn-red { background: #ef4444; color: white; }
    .table-area { background: #14532d; border: 2px dashed #22c55e; border-radius: 10px; flex: 1; display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; padding: 10px; overflow-x: auto; }
    .card-container { display: flex; justify-content: center; height: 120px; align-items: flex-end; margin-bottom: 10px; }
    .card { width: 65px; height: 95px; background-size: cover; border-radius: 6px; cursor: pointer; margin-right: -20px; box-shadow: -2px 2px 5px rgba(0,0,0,0.5); position: relative; }
    .card.selected { transform: translateY(-20px); border: 2px solid #3b82f6; }
    .action-badge { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #f59e0b; color: black; padding: 2px 5px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap; }
    .player-card-box { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    .controls { display: flex; gap: 10px; }
</style>
</head>
<body>

<div class="container">
    <div id="loginArea" class="panel">
        <h1>👑 លេងបៀរ កាតេ (Ka Te)</h1>
        <input type="text" id="playerName" placeholder="បញ្ចូលឈ្មោះរបស់អ្នក...">
        <input type="text" id="roomInput" placeholder="លេខបន្ទប់ (Room ID)...">
        <button class="btn-blue" onclick="createRoom()">➕ បង្កើតបន្ទប់</button>
        <button class="btn-green" onclick="joinRoom()">🚪 ចូលរួមបន្ទប់</button>
    </div>

    <div id="lobbyArea" class="panel" style="display: none;">
        <h2>បន្ទប់កាតេ៖ <span id="showRoom" style="color: #22c55e;"></span></h2>
        <button id="startBtn" class="btn-green" onclick="startGame()">🚀 ចាប់ផ្ដើមលេង</button>
    </div>

    <div id="gameArea" style="display: none; flex: 1; flex-direction: column; justify-content: space-between;">
        <div class="panel" style="padding: 8px; display: flex; justify-content: space-between;">
            <div id="status">ជុំទី៖ 1</div>
            <div id="turnStatus">វេន៖ ...</div>
        </div>

        <div class="table-area" id="table">
            <div style="color: #a7f3d0;">មិនទាន់មានបៀនៅលើតុឡើយ</div>
        </div>

        <div class="panel">
            <div id="myCards" class="card-container"></div>
            <div class="controls">
                <button class="btn-green" onclick="submitMove('play')">🎯 ស៊ីបៀរ / ចេញបៀ</button>
                <button class="btn-red" onclick="submitMove('fold')">🖐️ ធិបផ្កាប់បៀរ</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentRoom = null;
let myHand = [];
let selectedCard = null;

function createRoom() {
    const name = document.getElementById('playerName').value;
    const room = document.getElementById('roomInput').value;
    currentRoom = room;
    socket.emit('kt_createRoom', { roomId: room, playerName: name });
}

function joinRoom() {
    const name = document.getElementById('playerName').value;
    const room = document.getElementById('roomInput').value;
    currentRoom = room;
    socket.emit('kt_joinRoom', { roomId: room, playerName: name });
}

function startGame() {
    socket.emit('kt_startGame', currentRoom);
}

socket.on('roomCreated', (data) => {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
    document.getElementById('showRoom').innerText = data.roomId;
});

socket.on('roomJoined', () => {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('lobbyArea').style.display = 'block';
});

socket.on('gameStarted', (data) => {
    document.getElementById('lobbyArea').style.display = 'none';
    document.getElementById('gameArea').style.display = 'flex';
    document.getElementById('status').innerText = `ជុំទី៖ ${data.currentRound}`;
});

function getCardFileName(card) {
    let val = card.value.toLowerCase();
    if(val === 'a') val = 'ace'; if(val === 'j') val = 'jack'; if(val === 'q') val = 'queen'; if(val === 'k') val = 'king';
    let suit = '';
    if (card.suit === '♠') suit = 'spades'; else if (card.suit === '♣') suit = 'clubs'; else if (card.suit === '♦') suit = 'diamonds'; else if (card.suit === '♥') suit = 'hearts';
    return `PNG-cards/${val}_of_${suit}.png`;
}

socket.on('dealCards', (data) => {
    myHand = data.hand;
    renderHand();
});

function renderHand() {
    const container = document.getElementById('myCards');
    container.innerHTML = '';
    myHand.forEach(card => {
        const el = document.createElement('div');
        el.className = 'card';
        el.style.backgroundImage = `url('${getCardFileName(card)}')`;
        
        if(selectedCard && selectedCard.value === card.value && selectedCard.suit === card.suit) {
            el.classList.add('selected');
        }
        
        el.onclick = () => {
            selectedCard = card;
            renderHand();
        };
        container.appendChild(el);
    });
}

function submitMove(action) {
    if(!selectedCard) return alert("សូមជ្រើសរើសសន្លឹកបៀរមួយសន្លឹកសិន!");
    socket.emit('kt_playMove', { roomId: currentRoom, action, card: selectedCard });
    selectedCard = null;
}

socket.on('moveRecorded', (data) => {
    const tableDiv = document.getElementById('table');
    tableDiv.innerHTML = '';
    
    data.tableCards.forEach(m => {
        const box = document.createElement('div');
        box.className = 'player-card-box';
        
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        
        // លក្ខខណ្ឌច្បាប់ផ្កាប់បៀរជុំ ១ ដល់ ៤ និងការបង្ហាញសន្លឹកទី ៥ (គប់ទេ/អត់គប់ទេ/គប់ហើយ)
        if (m.action === 'fold' && data.round <= 4) {
            cardEl.style.backgroundImage = "url('PNG-cards/back.png')"; 
        } else {
            cardEl.style.backgroundImage = `url('${getCardFileName(m.card)}')`; 
        }
        
        const badge = document.createElement('div');
        badge.className = 'action-badge';
        badge.innerText = `${m.name}: ${m.action}`;
        cardEl.appendChild(badge);
        
        box.appendChild(cardEl);
        tableDiv.appendChild(box);
    });
});

socket.on('turnChanged', (data) => {
    document.getElementById('turnStatus').innerText = `វេនរបស់សមាជិកបន្ទាប់...`;
});

socket.on('nextRoundStarted', (data) => {
    document.getElementById('status').innerText = `ជុំទី៖ ${data.currentRound}`;
    document.getElementById('table').innerHTML = `<div style="color:#a7f3d0">ជុំថ្មី! អ្នកស៊ីចុងក្រោយគឺ៖ ${data.winnerName}</div>`;
    selectedCard = null;
    renderHand();
});

socket.on('gameWon', (data) => {
    alert(`🎉 ហ្គេមកាតេត្រូវបានបញ្ចប់! អ្នកឈ្នះចុងក្រោយគឺ៖ ${data.winner}`);
    location.reload();
});

socket.on('errorMsg', msg => alert(msg));
</script>
</body>
</html>
