<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 មជ្ឈមណ្ឌលហ្គេមបៀអនឡាញ</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .menu-container { text-align: center; background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 400px; width: 100%; }
        h1 { margin-bottom: 30px; font-size: 24px; color: #f59e0b; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; color: white; transition: transform 0.2s, background 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-tienlen { background: #3b82f6; }
        .btn-tienlen:hover { background: #2563eb; }
        .btn-kate { background: #22c55e; }
        .btn-kate:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>🃏 សូមជ្រើសរើសហ្គេមលេង</h1>
        <a href="/tienlen" class="btn btn-tienlen">🃏 លេងបៀរ ទៀនឡេន (Tien Len)</a>
        <a href="/kate" class="btn btn-kate">🎴 លេងបៀរ កាតេ (Ka Te)</a>
    </div>
</body>
</html>
