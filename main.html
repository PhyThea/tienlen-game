<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 មជ្ឈមណ្ឌលហ្គេមបៀអនឡាញ</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .menu-container { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 450px; width: 100%; margin-top: -5vh; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 22px; color: #f59e0b; }
        
        /* 🎨 ស្ទីលសម្រាប់ប្រអប់បញ្ចូលឈ្មោះ */
        .name-input { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #475569; border-radius: 10px; font-size: 16px; background: #334155; color: white; text-align: center; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        .name-input:focus { border-color: #3b82f6; }
        .name-input::placeholder { color: #94a3b8; }

        .btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; color: white; transition: transform 0.2s, background 0.2s; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-tienlen { background: #3b82f6; }
        .btn-tienlen:hover { background: #2563eb; }
        .btn-kate { background: #22c55e; }
        .btn-kate:hover { background: #16a34a; }
        
        /* 🏰 ស្ទីលបញ្ជីបន្ទប់ */
        .room-section { margin-top: 25px; border-top: 1px dashed #475569; padding-top: 15px; }
        .room-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .room-list { max-height: 180px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .room-list::-webkit-scrollbar { width: 6px; }
        .room-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .room-item { background: #334155; padding: 10px 15px; border-radius: 8px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .no-room { color: #94a3b8; font-size: 13px; font-style: italic; text-align: center; padding: 10px 0; }
        .join-badge { padding: 8px 14px; border: none; border-radius: 6px; font-weight: bold; text-decoration: none; color: white; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        .join-badge:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>🃏 សូមជ្រើសរើសហ្គេមលេង</h1>
        
        <input type="text" id="globalPlayerName" class="name-input" placeholder="📝 សូមបញ្ចូលឈ្មោះរបស់អ្នកទីនេះ...">

        <button onclick="goToGame('/tienlen')" class="btn btn-tienlen">🃏 លេងបៀរ ទៀនឡេន (Tien Len)</button>
        <button onclick="goToGame('/kate')" class="btn btn-kate">🎴 លេងបៀរ កាតេ (Ka Te)</button>

        <div class="room-section">
            <div class="room-title" style="color: #3b82f6;">🏰 បន្ទប់រង់ចាំ ទៀនឡេន (Tien Len)៖</div>
            <div id="tlRoomList" class="room-list">
                <div class="no-room">កំពុងទាញយកទិន្នន័យ...</div>
            </div>

            <div class="room-title" style="color: #22c55e; margin-top: 15px;">🏰 បន្ទប់រង់ចាំ កាតេ (Ka Te)៖</div>
            <div id="ktRoomList" class="room-list">
                <div class="no-room">កំពុងទាញយកទិន្នន័យ...</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // ទាញយកឈ្មោះចាស់មកបង្ហាញ (បើធ្លាប់លេង)
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('tienlen_name');
            if (savedName) {
                document.getElementById('globalPlayerName').value = savedName;
            }
        });

        // មុខងារត្រួតពិនិត្យ និងរក្សាទុកឈ្មោះ
        function validateAndSaveName() {
            const nameInput = document.getElementById('globalPlayerName').value.trim();
            if (!nameInput) {
                alert("⚠️ សូមបញ្ចូលឈ្មោះរបស់អ្នកនៅប្រអប់ខាងលើជាមុនសិន!");
                document.getElementById('globalPlayerName').focus();
                return null;
            }
            // រក្សាទុកឈ្មោះទៅក្នុង LocalStorage ដើម្បីឱ្យហ្គេមទាញយកទៅប្រើ
            localStorage.setItem('tienlen_name', nameInput);
            localStorage.setItem('player_name', nameInput);
            return nameInput;
        }

        // មុខងារចូលទៅបង្កើត/លេងហ្គេមថ្មី
        function goToGame(url) {
            if (validateAndSaveName()) {
                window.location.href = url;
            }
        }

        // ស្តាប់បញ្ជីបន្ទប់ Tien Len
        socket.on('tlRoomList', (rooms) => {
            renderRooms('tlRoomList', rooms, '/tienlen', 'btn-tienlen');
        });

        // ស្តាប់បញ្ជីបន្ទប់ Ka Te
        socket.on('ktRoomList', (rooms) => {
            renderRooms('ktRoomList', rooms, '/kate', 'btn-kate');
        });

        function renderRooms(elementId, rooms, redirectUrl, btnClass) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            
            if (rooms.length === 0) {
                container.innerHTML = '<div class="no-room">មិនទាន់មានបន្ទប់នៅឡើយទេ...</div>';
                return;
            }

            rooms.forEach(r => {
                const item = document.createElement('div');
                item.className = 'room-item';
                const maxPlayers = redirectUrl.includes('kate') ? 6 : 4; 
                
                item.innerHTML = `
                    <div>
                        <strong>បន្ទប់: ${r.roomId}</strong> ${r.hasPassword ? '🔒' : '🔓'}
                        <br>
                        <small style="color: #94a3b8;">សមាជិក: ${r.playerCount}/${maxPlayers} នាក់</small>
                    </div>
                    <button class="join-badge ${btnClass}" 
                        onclick="directJoinRoom('${r.roomId}', ${r.hasPassword}, '${redirectUrl}')">
                        ចូលរួម
                    </button>
                `;
                container.appendChild(item);
            });
        }

        // មុខងារចូលបន្ទប់ដោយផ្ទាល់ (កែសម្រួលឈប់ប្រើ prompt សួរឈ្មោះ)
        function directJoinRoom(roomId, hasPassword, redirectUrl) {
            const playerName = validateAndSaveName();
            if (!playerName) return; // បញ្ឈប់ប្រសិនបើអត់វាយឈ្មោះ

            let password = "";
            if (hasPassword) {
                const passInput = prompt("🔒 សូមបញ្ចូលលេខកូដសម្ងាត់បន្ទប់៖");
                if (passInput === null) return; 
                password = passInput;
            }

            localStorage.setItem('auto_join_room_id', roomId);
            localStorage.setItem('auto_join_password', password);
            
            location.href = redirectUrl;
        }
    </script>
</body>
</html>
