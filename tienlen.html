<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>рҹғҸ бһ бҹ’бһӮбҹҒбһҳбһ‘бҹҖбһ“бһЎбҹҒбһ“ Online</title>
<script src="/socket.io/socket.io.js"></script>
<style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 15px; margin: 0; }
    .game-container { max-width: 900px; margin: auto; }
    .table-panel { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 2px solid #334155; }
    .played-area { min-height: 120px; background: #020617; border-radius: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; margin: 15px 0; padding: 10px; }
    .card { background: white; color: black; width: 55px; height: 85px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 18px; cursor: pointer; border: 2px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .card.red { color: #ef4444; }
    .card.selected { transform: translateY(-15px); border-color: #22c55e; box-shadow: 0 5px 15px rgba(34,197,94,0.4); }
    .my-hand-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 25px; min-height: 100px; }
    .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
    button { padding: 10px 25px; font-size: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    .btn-play { background: #22c55e; color: white; }
    .btn-pass { background: #ef4444; color: white; }
    .btn-leave { background: #64748b; color: white; }
    .player-list { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; background: #334155; padding: 10px; border-radius: 8px; }
    .player-badge { padding: 5px 10px; border-radius: 5px; background: #1e293b; }
    .player-badge.active-turn { border: 2px solid #38bdf8; background: #0369a1; }
    .popup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
    .popup-box { background:#1e293b; padding:30px; border-radius:12px; text-align:center; max-width:400px; width:100%; }
</style>
</head>
<body>
<div class="game-container">
    <div class="player-list" id="playerList"></div>
    
    <div class="table-panel">
        <h3 id="statusBar">вҸі бһҖбҹҶбһ–бһ»бһ„бһҡбһ„бҹӢбһ…бһ¶бҹҶбһўбҹ’бһ“бһҖбһ”бһ„бҹ’бһҖбһҫбһҸбһ”бһ“бҹ’бһ‘бһ”бҹӢбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳ...</h3>
        <div class="played-area" id="playedArea">бһ”бҹҖбһҡбһ“бҹ…бһӣбһҫбһҸбһ»</div>
        <div class="btn-group">
            <button id="startBtn" style="background:#38bdf8; color:white; display:none;" onclick="startGame()">бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһ бҹ’бһӮбҹҒбһҳ</button>
            <button class="btn-play" onclick="playSelected()">бһ…бһ»бҹҮбһ”бҹҖбһҡ</button>
            <button class="btn-pass" onclick="passTurn()">бһҡбҹҶбһӣбһ„ (Pass)</button>
            <button class="btn-leave" onclick="leaveRoom()">бһ…бһ¶бһҖбһ…бҹҒбһү</button>
        </div>
    </div>

    <div class="my-hand-area" id="myHandArea"></div>
</div>

<div class="popup" id="resultPopup">
    <div class="popup-box">
        <h2 style="color:#fef08a;">рҹҸҒ бһ бҹ’бһӮбҹҒбһҳбһ”бһ¶бһ“бһ”бһүбҹ’бһ…бһ”бҹӢ!</h2>
        <h3 id="winnerName" style="margin: 15px 0;">бһўбҹ’бһ“бһҖбһҲбҹ’бһ“бҹҮбҹ– -</h3>
        <div id="resultListArea" style="text-align:left; margin-bottom:20px;"></div>
        <button onclick="window.location.href='/'" style="background:#22c55e; color:white;">бһҸбҹ’бһҡбһЎбһ”бҹӢбһ‘бҹ… Lobby</button>
    </div>
</div>

<script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const playerName = sessionStorage.getItem('playerName') || "Guest";

    let myHand = [];
    let selectedCards = [];

    if(!roomId) window.location.href = '/';

    socket.emit('joinRoom', { roomId, password: "", playerName });

    socket.on('roomJoined', () => {
        socket.emit('getRoomInfo', roomId);
    });

    socket.on('roomInfo', ({ players, creatorId, status }) => {
        updatePlayersList(players, -1);
        if(socket.id === creatorId && status === 'waiting') {
            document.getElementById('startBtn').style.display = 'inline-block';
        }
    });

    socket.on('updatePlayers', (players) => {
        updatePlayersList(players, -1);
    });

    function updatePlayersList(players, turnIdx) {
        const list = document.getElementById('playerList');
        list.innerHTML = '';
        players.forEach((p, idx) => {
            const isTurn = idx === turnIdx;
            list.innerHTML += `
                <div class="player-badge ${isTurn ? 'active-turn':''}">
                    рҹ‘Ө ${p.name} ${p.id === socket.id ? '(бһҒбҹ’бһүбһ»бҹҶ)':''} <br>
                    рҹҺҙ бһҹбһӣбҹӢбһ”бҹҖбһҡбҹ– ${p.hand ? p.hand.length : 0} ${p.passed ? ' [Pass]':''}
                    ${p.rank ? `<b style="color:#fef08a"> (бһӣбҹҶбһҠбһ¶бһ”бҹӢбһ‘бһё ${p.rank})</b>`:''}
                </div>
            `;
        });
    }

    function startGame() {
        socket.emit('startGame', roomId);
    }

    socket.on('dealCards', ({ hand }) => {
        myHand = hand;
        selectedCards = [];
        document.getElementById('startBtn').style.display = 'none';
        renderHand();
    });

    socket.on('gameStarted', ({ players, currentTurnIndex }) => {
        document.getElementById('statusBar').innerText = "рҹҺ® бһ бҹ’бһӮбҹҒбһҳбһҖбҹҶбһ–бһ»бһ„бһӣбҹҒбһ„...";
        updatePlayersList(players, currentTurnIndex);
    });

    function renderHand() {
        const area = document.getElementById('myHandArea');
        area.innerHTML = '';
        myHand.forEach((card, idx) => {
            const isRed = card.suit === 'вҷҰ' || card.suit === 'вҷҘ';
            const isSel = selectedCards.includes(idx);
            area.innerHTML += `
                <div class="card ${isRed?'red':''} ${isSel?'selected':''}" onclick="toggleCard(${idx})">
                    <div>${card.value}</div>
                    <div style="align-self:flex-end;">${card.suit}</div>
                </div>
            `;
        });
    }

    function toggleCard(idx) {
        if(selectedCards.includes(idx)) {
            selectedCards = selectedCards.filter(i => i !== idx);
        } else {
            selectedCards.push(idx);
        }
        renderHand();
    }

    function playSelected() {
        if(selectedCards.length === 0) return alert("бһҹбһјбһҳбһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһ”бҹҖбһҡбһҠбһҫбһҳбҹ’бһ”бһёбһ…бһ»бҹҮ!");
        const cardsToPlay = selectedCards.map(idx => myHand[idx]);
        socket.emit('playCard', { roomId, cards: cardsToPlay });
    }

    socket.on('cardPlayed', ({ by, cards, nextTurn, updatedHands }) => {
        const pArea = document.getElementById('playedArea');
        pArea.innerHTML = '';
        cards.forEach(card => {
            const isRed = card.suit === 'вҷҰ' || card.suit === 'вҷҘ';
            pArea.innerHTML += `
                <div class="card ${isRed?'red':''}">
                    <div>${card.value}</div>
                    <div style="align-self:flex-end;">${card.suit}</div>
                </div>
            `;
        });
        document.getElementById('statusBar').innerText = `Turn бһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбҹ– ${by}`;
        
        // бһ’бҹ’бһңбһҫбһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһ—бһ¶бһ–бһ”бҹҖбһҡбһҖбҹ’бһ“бһ»бһ„бһҠбҹғбһҒбҹ’бһӣбһҪбһ“бһҜбһ„бһЎбһҫбһ„бһңбһ·бһү бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҒбҹ’бһӣбһҪбһ“бһҮбһ¶бһўбҹ’бһ“бһҖбһ…бһ»бҹҮбһ”бҹҖбһҡ
        if(by === playerName) {
            myHand = myHand.filter((_, idx) => !selectedCards.includes(idx));
            selectedCards = [];
            renderHand();
        }
        updatePlayersList(updatedHands, nextTurn);
    });

    function passTurn() {
        socket.emit('passTurn', roomId);
    }

    socket.on('playerPassed', ({ name }) => {
        document.getElementById('statusBar').innerText = `рҹ‘Ө ${name} бһ”бһ¶бһ“бһ бһ»бһ…бһҡбҹҶбһӣбһ„ (Pass)`;
    });

    socket.on('turnChanged', ({ currentTurnIndex }) => {
        socket.emit('getRoomInfo', roomId); 
    });

    socket.on('clearTable', ({ nextPlayer }) => {
        document.getElementById('playedArea').innerHTML = 'бһҠбһ¶бһ…бҹӢбһ‘бһ№бһҖ! бһҸбһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҹбҹҶбһўбһ¶бһҸ';
        document.getElementById('statusBar').innerText = `бһ‘бһ№бһҖбһҗбҹ’бһҳбһёбһ…бҹҒбһүбһҳбһ»бһ“бһҠбҹ„бһҷбҹ– ${nextPlayer}`;
    });

    socket.on('gameWon', ({ winner, allHands }) => {
        document.getElementById('resultPopup').style.display = 'flex';
        document.getElementById('winnerName').innerText = `рҹҸҶ бһўбҹ’бһ“бһҖбһҲбҹ’бһ“бҹҮбһӣбҹҒбһҒбҹЎбҹ– ${winner}`;
        const area = document.getElementById('resultListArea');
        area.innerHTML = allHands.map(p => `<div>рҹ‘Ө <b>${p.name}</b> : бһӣбҹҶбһҠбһ¶бһ”бҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбһ‘бһё ${p.rank || 'бһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷ'}</div>`).join('');
    });

    function leaveRoom() {
        socket.emit('leaveRoom');
    }
    socket.on('leftRoom', () => window.location.href = '/');
    socket.on('errorMsg', msg => alert(msg));
</script>
</body>
</html>
